<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Deep Link Tester</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface-hover: #242424;
    --border: #2a2a2a;
    --text: #e4e4e4;
    --text-muted: #888;
    --accent: #6e8efb;
    --accent-dim: rgba(110, 142, 251, 0.08);
    --success: #4caf50;
    --success-dim: rgba(76, 175, 80, 0.08);
    --warn: #f7a84e;
    --warn-dim: rgba(247, 168, 78, 0.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 1.25rem 1.5rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
  }

  header p {
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  /* Input area */
  .input-area {
    margin-bottom: 1.5rem;
  }

  .input-unit {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .input-unit:focus-within {
    border-color: var(--accent);
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--text-muted);
    pointer-events: none;
  }

  .input-wrap input {
    width: 100%;
    padding: 0.7rem 1rem 0.7rem 2.5rem;
    border: none;
    background: var(--surface);
    color: var(--text);
    font-size: 1rem;
    font-family: inherit;
    outline: none;
  }

  .input-wrap input::placeholder { color: var(--text-muted); }

  .custom-row {
    display: flex;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .input-unit:focus-within .custom-row {
    border-top-color: var(--accent);
  }

  .custom-row input {
    flex: 1;
    padding: 0.5rem 0.75rem;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
  }

  .custom-row input::placeholder { color: var(--text-muted); }

  .custom-row button {
    padding: 0.5rem 1rem;
    border: none;
    border-left: 1px solid var(--border);
    background: transparent;
    color: var(--accent);
    font-size: 0.8rem;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .custom-row button:hover {
    background: var(--accent-dim);
  }

  .hint {
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
  }

  /* Results */
  .results {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .results:empty::after {
    content: "Type an app name above to generate deep link guesses.";
    display: block;
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  .link-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    transition: border-color 0.2s;
  }

  .link-card:hover {
    border-color: #3a3a3a;
  }

  .link-card .link-info {
    flex: 1;
    min-width: 0;
  }

  .link-card .link-url {
    font-size: 0.9rem;
    font-family: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", monospace;
    word-break: break-all;
  }

  .link-card .link-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 0.15rem;
  }

  .link-card .confidence {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    margin-left: 0.4rem;
    vertical-align: middle;
  }

  .confidence.high {
    color: var(--success);
    background: var(--success-dim);
  }

  .confidence.medium {
    color: var(--warn);
    background: var(--warn-dim);
  }

  .confidence.low {
    color: var(--text-muted);
    background: rgba(136, 136, 136, 0.1);
  }

  .try-btn {
    flex-shrink: 0;
    padding: 0.4rem 0.9rem;
    border: 1px solid var(--accent);
    border-radius: 8px;
    background: transparent;
    color: var(--accent);
    font-size: 0.8rem;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    text-decoration: none;
  }

  .try-btn:hover {
    background: var(--accent);
    color: #fff;
  }

  .section-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-top: 0.75rem;
    margin-bottom: 0.1rem;
    padding-left: 0.25rem;
  }

  .section-label:first-child {
    margin-top: 0;
  }

  /* Log */
  .log-area {
    margin-top: 1.5rem;
  }

  .log-area h2 {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }

  .log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 0.78rem;
    font-family: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", monospace;
    color: var(--text-muted);
    max-height: 200px;
    overflow-y: auto;
    line-height: 1.7;
  }

  .log:empty::after {
    content: "Attempted links will appear here...";
  }

  .log .entry { margin-bottom: 0.15rem; }
  .log .entry.ok { color: var(--success); }
  .log .entry.fail { color: var(--warn); }

  @media (max-width: 600px) {
    .container { padding: 1rem 1rem 3rem; }
    .try-btn { padding: 0.5rem 0.75rem; }
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f5f5;
      --surface: #fff;
      --surface-hover: #fafafa;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --text-muted: #777;
      --accent: #4a6cf7;
      --accent-dim: rgba(74, 108, 247, 0.06);
      --success: #2e7d32;
      --success-dim: rgba(46, 125, 50, 0.08);
      --warn: #e68a00;
      --warn-dim: rgba(230, 138, 0, 0.08);
    }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>App Deep Link Tester</h1>
    <p>Enter an app name to generate deep link guesses, or type a custom URI to try</p>
  </header>

  <div class="input-area">
    <div class="input-unit">
      <div class="input-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
        <input type="text" id="app-name" placeholder="App name (e.g. Spotify, Slack, WhatsApp...)" autocomplete="off" autofocus>
      </div>
      <div class="custom-row">
        <input type="text" id="custom-uri" placeholder="Or enter a custom URI: myapp://path">
        <button id="try-custom">Try it</button>
      </div>
    </div>
    <div class="hint">Press Enter or tap a "Try" button to attempt opening</div>
  </div>

  <div class="results" id="results"></div>

  <div class="log-area">
    <h2>Attempt Log</h2>
    <div class="log" id="log"></div>
  </div>
</div>

<script>
  // Known deep link schemes for popular apps
  const KNOWN_APPS = {
    'spotify':        { schemes: ['spotify://'], note: 'Official scheme' },
    'slack':          { schemes: ['slack://'], note: 'Official scheme' },
    'whatsapp':       { schemes: ['whatsapp://'], note: 'Official scheme' },
    'telegram':       { schemes: ['tg://'], note: 'Official scheme' },
    'signal':         { schemes: ['sgnl://', 'signal://'], note: 'Official scheme' },
    'discord':        { schemes: ['discord://'], note: 'Official scheme' },
    'twitter':        { schemes: ['twitter://', 'x://'], note: 'Official scheme' },
    'x':              { schemes: ['twitter://', 'x://'], note: 'Twitter/X' },
    'instagram':      { schemes: ['instagram://'], note: 'Official scheme' },
    'facebook':       { schemes: ['fb://'], note: 'Official scheme' },
    'messenger':      { schemes: ['fb-messenger://'], note: 'Facebook Messenger' },
    'snapchat':       { schemes: ['snapchat://'], note: 'Official scheme' },
    'tiktok':         { schemes: ['snssdk1128://', 'tiktok://'], note: 'Official scheme' },
    'reddit':         { schemes: ['reddit://'], note: 'Official scheme' },
    'pinterest':      { schemes: ['pinterest://'], note: 'Official scheme' },
    'linkedin':       { schemes: ['linkedin://'], note: 'Official scheme' },
    'youtube':        { schemes: ['youtube://', 'vnd.youtube://'], note: 'Official scheme' },
    'netflix':        { schemes: ['nflx://'], note: 'Official scheme' },
    'hulu':           { schemes: ['hulu://'], note: 'Official scheme' },
    'disney+':        { schemes: ['disneyplus://'], note: 'Official scheme' },
    'disneyplus':     { schemes: ['disneyplus://'], note: 'Official scheme' },
    'disney plus':    { schemes: ['disneyplus://'], note: 'Official scheme' },
    'hbo max':        { schemes: ['hbomax://'], note: 'Official scheme' },
    'max':            { schemes: ['hbomax://'], note: 'HBO Max' },
    'prime video':    { schemes: ['aiv://'], note: 'Amazon Prime Video' },
    'amazon':         { schemes: ['com.amazon.mobile.shopping://'], note: 'Amazon Shopping' },
    'twitch':         { schemes: ['twitch://'], note: 'Official scheme' },
    'zoom':           { schemes: ['zoomus://'], note: 'Official scheme' },
    'teams':          { schemes: ['msteams://'], note: 'Microsoft Teams' },
    'microsoft teams':{ schemes: ['msteams://'], note: 'Official scheme' },
    'outlook':        { schemes: ['ms-outlook://'], note: 'Microsoft Outlook' },
    'gmail':          { schemes: ['googlegmail://'], note: 'Official scheme' },
    'google maps':    { schemes: ['comgooglemaps://', 'google.maps://'], note: 'Official scheme' },
    'maps':           { schemes: ['comgooglemaps://', 'maps://'], note: 'Google Maps / Apple Maps' },
    'waze':           { schemes: ['waze://'], note: 'Official scheme' },
    'uber':           { schemes: ['uber://'], note: 'Official scheme' },
    'lyft':           { schemes: ['lyft://'], note: 'Official scheme' },
    'venmo':          { schemes: ['venmo://'], note: 'Official scheme' },
    'paypal':         { schemes: ['paypal://'], note: 'Official scheme' },
    'cash app':       { schemes: ['cashme://','squarecash://'], note: 'Cash App' },
    'cashapp':        { schemes: ['cashme://','squarecash://'], note: 'Cash App' },
    'robinhood':      { schemes: ['robinhood://'], note: 'Official scheme' },
    'coinbase':       { schemes: ['coinbase://'], note: 'Official scheme' },
    'chrome':         { schemes: ['googlechrome://','googlechromes://'], note: 'Google Chrome' },
    'firefox':        { schemes: ['firefox://'], note: 'Official scheme' },
    'brave':          { schemes: ['brave://'], note: 'Official scheme' },
    'safari':         { schemes: ['x-web-search://'], note: 'Safari (limited)' },
    'google':         { schemes: ['google://'], note: 'Google Search' },
    'google drive':   { schemes: ['googledrive://'], note: 'Official scheme' },
    'google docs':    { schemes: ['googledocs://'], note: 'Official scheme' },
    'google sheets':  { schemes: ['googlesheets://'], note: 'Official scheme' },
    'google photos':  { schemes: ['googlephotos://'], note: 'Official scheme' },
    'google calendar':{ schemes: ['googlecalendar://'], note: 'Official scheme' },
    'google keep':    { schemes: ['comgooglekeep://'], note: 'Official scheme' },
    'notion':         { schemes: ['notion://'], note: 'Official scheme' },
    'todoist':        { schemes: ['todoist://'], note: 'Official scheme' },
    'trello':         { schemes: ['trello://'], note: 'Official scheme' },
    'evernote':       { schemes: ['evernote://'], note: 'Official scheme' },
    'bear':           { schemes: ['bear://'], note: 'Official scheme' },
    'obsidian':       { schemes: ['obsidian://'], note: 'Official scheme' },
    'onenote':        { schemes: ['onenote://'], note: 'Official scheme' },
    'dropbox':        { schemes: ['dbapi-1://','dropbox://'], note: 'Official scheme' },
    'onedrive':       { schemes: ['ms-onedrive://'], note: 'Official scheme' },
    'chatgpt':        { schemes: ['chatgpt://'], note: 'Official scheme' },
    'claude':         { schemes: ['claude://'], note: 'Official scheme' },
    'gemini':         { schemes: ['googlegemini://'], note: 'Official scheme' },
    'perplexity':     { schemes: ['perplexity://'], note: 'Official scheme' },
    'proton mail':    { schemes: ['protonmail://'], note: 'Official scheme' },
    'protonmail':     { schemes: ['protonmail://'], note: 'Official scheme' },
    'proton drive':   { schemes: ['protondrive://'], note: 'Official scheme' },
    'proton calendar':{ schemes: ['protoncalendar://'], note: 'Official scheme' },
    'oura':           { schemes: ['oura://'], note: 'Oura Ring' },
    'strava':         { schemes: ['strava://'], note: 'Official scheme' },
    'fitbit':         { schemes: ['fitbit://'], note: 'Official scheme' },
    'peloton':        { schemes: ['peloton://'], note: 'Official scheme' },
    'nike':           { schemes: ['nike://'], note: 'Nike app' },
    'nike run club':  { schemes: ['nikerunclub://'], note: 'Official scheme' },
    'airbnb':         { schemes: ['airbnb://'], note: 'Official scheme' },
    'doordash':       { schemes: ['doordash://'], note: 'Official scheme' },
    'grubhub':        { schemes: ['grubhub://'], note: 'Official scheme' },
    'ubereats':       { schemes: ['ubereats://'], note: 'Official scheme' },
    'uber eats':      { schemes: ['ubereats://'], note: 'Official scheme' },
    'yelp':           { schemes: ['yelp://'], note: 'Official scheme' },
    'shazam':         { schemes: ['shazam://'], note: 'Official scheme' },
    'soundcloud':     { schemes: ['soundcloud://'], note: 'Official scheme' },
    'apple music':    { schemes: ['music://','musics://'], note: 'Apple Music' },
    'pandora':        { schemes: ['pandora://'], note: 'Official scheme' },
    'amazon music':   { schemes: ['amznmp3://'], note: 'Amazon Music' },
    'kindle':         { schemes: ['kindle://'], note: 'Official scheme' },
    'audible':        { schemes: ['audible://'], note: 'Official scheme' },
    'github':         { schemes: ['github://'], note: 'Official scheme' },
    'vscode':         { schemes: ['vscode://'], note: 'Visual Studio Code' },
    'figma':          { schemes: ['figma://'], note: 'Official scheme' },
    'canva':          { schemes: ['canva://'], note: 'Official scheme' },
    'duolingo':       { schemes: ['duolingo://'], note: 'Official scheme' },
    'headspace':      { schemes: ['headspace://'], note: 'Official scheme' },
    'calm':           { schemes: ['calm://'], note: 'Official scheme' },
    'the economist':  { schemes: ['com.economist.lamarr://home'], note: 'Official scheme' },
    'economist':      { schemes: ['com.economist.lamarr://home'], note: 'The Economist' },
    'fantastical':    { schemes: ['x-fantastical3://'], note: 'Fantastical (macOS/iOS)' },
    'manus':          { schemes: ['manusapp://'], note: 'Official scheme' },
    'clublocker':     { schemes: ['clublocker://'], note: 'Official scheme' },
    'threads':        { schemes: ['barcelona://'], note: 'Meta Threads' },
    'whatsapp business': { schemes: ['whatsapp-business://','smb://'], note: 'WhatsApp Business' },
    'settings':       { schemes: ['app-settings://','App-prefs://'], note: 'iOS Settings' },
    'phone':          { schemes: ['tel://'], note: 'Phone dialer' },
    'sms':            { schemes: ['sms://'], note: 'Messages' },
    'facetime':       { schemes: ['facetime://'], note: 'FaceTime' },
    'apple maps':     { schemes: ['maps://'], note: 'Apple Maps' },
  };

  const appNameInput = document.getElementById('app-name');
  const customUriInput = document.getElementById('custom-uri');
  const tryCustomBtn = document.getElementById('try-custom');
  const resultsEl = document.getElementById('results');
  const logEl = document.getElementById('log');

  let debounceTimer;

  appNameInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(generateLinks, 200);
  });

  appNameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      // Try the first result
      const firstBtn = resultsEl.querySelector('.try-btn');
      if (firstBtn) firstBtn.click();
    }
  });

  customUriInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      tryCustomLink();
    }
  });

  tryCustomBtn.addEventListener('click', tryCustomLink);

  function tryCustomLink() {
    const uri = customUriInput.value.trim();
    if (!uri) return;
    // Ensure it has :// if user just typed e.g. "myapp"
    const finalUri = uri.includes('://') ? uri : uri + '://';
    attemptLink(finalUri, 'custom');
  }

  function generateLinks(name) {
    const raw = (typeof name === 'string' ? name : appNameInput.value).trim();
    resultsEl.innerHTML = '';
    if (!raw) return;

    const lower = raw.toLowerCase();
    const links = [];
    const seen = new Set();

    function addLink(scheme, label, confidence) {
      if (seen.has(scheme)) return;
      seen.add(scheme);
      links.push({ scheme, label, confidence });
    }

    // Check known apps
    const known = KNOWN_APPS[lower];
    if (known) {
      known.schemes.forEach(s => addLink(s, known.note, 'high'));
    }

    // Partial matches in known apps
    for (const [key, val] of Object.entries(KNOWN_APPS)) {
      if (key !== lower && (key.includes(lower) || lower.includes(key))) {
        val.schemes.forEach(s => addLink(s, val.note + ' (partial match: ' + key + ')', 'medium'));
      }
    }

    // Smart guesses based on the name
    const slug = lower.replace(/[^a-z0-9]/g, '');
    const slugDash = lower.replace(/[^a-z0-9]/g, '-').replace(/-+/g,'-').replace(/^-|-$/g,'');
    const slugWords = lower.replace(/[^a-z0-9 ]/g, '').split(/\s+/).filter(Boolean);

    // Common pattern: appname://
    addLink(slug + '://', 'Common pattern: name as scheme', 'medium');

    // With dots for multi-word
    if (slugWords.length > 1) {
      addLink(slugWords.join('') + '://', 'Combined words', 'medium');
      addLink(slugWords.join('-') + '://', 'Hyphenated', 'low');
    }

    // iOS bundle-id style patterns
    addLink('com.' + slug + '.' + slug + '://', 'Bundle ID style', 'low');

    // Universal link guesses
    const domainGuesses = [
      slug + '.com',
      slug + '.app',
      slug + '.io',
    ];
    domainGuesses.forEach(d => {
      addLink('https://' + d + '/', 'Web / Universal Link', 'low');
    });

    // Render
    let hasHigh = links.some(l => l.confidence === 'high');
    let hasMedium = links.some(l => l.confidence === 'medium');
    let hasLow = links.some(l => l.confidence === 'low');

    if (hasHigh) {
      resultsEl.insertAdjacentHTML('beforeend', '<div class="section-label">Known Schemes</div>');
      links.filter(l => l.confidence === 'high').forEach(renderLink);
    }
    if (hasMedium) {
      resultsEl.insertAdjacentHTML('beforeend', '<div class="section-label">Best Guesses</div>');
      links.filter(l => l.confidence === 'medium').forEach(renderLink);
    }
    if (hasLow) {
      resultsEl.insertAdjacentHTML('beforeend', '<div class="section-label">Other Patterns</div>');
      links.filter(l => l.confidence === 'low').forEach(renderLink);
    }
  }

  function renderLink(link) {
    const card = document.createElement('div');
    card.className = 'link-card';
    card.innerHTML =
      '<div class="link-info">' +
        '<div class="link-url">' + escHtml(link.scheme) + '</div>' +
        '<div class="link-label">' + escHtml(link.label) +
          '<span class="confidence ' + link.confidence + '">' + link.confidence + '</span>' +
        '</div>' +
      '</div>' +
      '<button class="try-btn">Try</button>';
    card.querySelector('.try-btn').addEventListener('click', () => {
      attemptLink(link.scheme, link.label);
    });
    resultsEl.appendChild(card);
  }

  function attemptLink(uri, label) {
    const ts = new Date().toLocaleTimeString();
    addLog(ts + '  Trying: ' + uri);

    // Use a hidden iframe for app schemes to avoid navigating away if it fails.
    // For https links just open in new tab.
    if (uri.startsWith('http://') || uri.startsWith('https://')) {
      window.open(uri, '_blank');
      addLog(ts + '  Opened in new tab: ' + uri, 'ok');
      return;
    }

    // For custom schemes, try to open via location change
    // On mobile this will launch the app or do nothing
    const before = Date.now();
    window.location.href = uri;

    // Check after a delay if we're still here (app didn't open)
    setTimeout(() => {
      if (document.visibilityState === 'hidden') {
        addLog(ts + '  App opened! ' + uri, 'ok');
      } else {
        addLog(ts + '  No app responded to: ' + uri + ' (may not be installed or wrong scheme)', 'fail');
      }
    }, 1500);
  }

  function addLog(msg, type) {
    const div = document.createElement('div');
    div.className = 'entry' + (type ? ' ' + type : '');
    div.textContent = msg;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Focus
  if (!('ontouchstart' in window)) appNameInput.focus();

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== appNameInput && document.activeElement !== customUriInput) {
      e.preventDefault();
      appNameInput.focus();
    }
    if (e.key === 'Escape') {
      appNameInput.value = '';
      customUriInput.value = '';
      resultsEl.innerHTML = '';
      appNameInput.blur();
    }
  });
</script>
</body>
</html>
