<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="globe-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="50%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="panel-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Globe body -->
  <circle cx="512" cy="512" r="260" fill="url(#globe-grad)" opacity="0.9"/>

  <!-- Globe grid lines - latitude -->
  <ellipse cx="512" cy="512" rx="260" ry="90" fill="none" stroke="#E3F2FD" stroke-width="5" opacity="0.35"/>
  <ellipse cx="512" cy="512" rx="260" ry="180" fill="none" stroke="#E3F2FD" stroke-width="5" opacity="0.3"/>

  <!-- Globe grid lines - longitude -->
  <ellipse cx="512" cy="512" rx="90" ry="260" fill="none" stroke="#E3F2FD" stroke-width="5" opacity="0.35"/>
  <ellipse cx="512" cy="512" rx="180" ry="260" fill="none" stroke="#E3F2FD" stroke-width="5" opacity="0.3"/>

  <!-- Equator -->
  <line x1="252" y1="512" x2="772" y2="512" stroke="#E3F2FD" stroke-width="5" opacity="0.3"/>
  <!-- Prime meridian -->
  <line x1="512" y1="252" x2="512" y2="772" stroke="#E3F2FD" stroke-width="5" opacity="0.3"/>

  <!-- Globe outline -->
  <circle cx="512" cy="512" r="260" fill="none" stroke="#E3F2FD" stroke-width="7" opacity="0.5"/>

  <!-- Orbital ring 1 (tilted) -->
  <ellipse cx="512" cy="512" rx="400" ry="120" fill="none" stroke="url(#ring-grad)" stroke-width="8" opacity="0.6" transform="rotate(-30 512 512)"/>

  <!-- Orbital ring 2 (tilted other way) -->
  <ellipse cx="512" cy="512" rx="400" ry="120" fill="none" stroke="url(#ring-grad)" stroke-width="8" opacity="0.6" transform="rotate(40 512 512)"/>

  <!-- Orbital ring 3 -->
  <ellipse cx="512" cy="512" rx="400" ry="120" fill="none" stroke="url(#ring-grad)" stroke-width="8" opacity="0.5" transform="rotate(-80 512 512)"/>

  <!-- Satellite 1 - on ring 1 (right side) -->
  <g transform="rotate(-30 512 512)">
    <!-- Body: rectangular bus -->
    <rect x="868" y="500" width="24" height="24" rx="3" fill="#E3F2FD"/>
    <!-- Left solar panel arm -->
    <line x1="868" y1="512" x2="838" y2="512" stroke="#B0BEC5" stroke-width="3"/>
    <!-- Left solar panel -->
    <rect x="818" y="501" width="20" height="22" rx="2" fill="url(#panel-grad)" opacity="0.9"/>
    <line x1="828" y1="501" x2="828" y2="523" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <line x1="818" y1="512" x2="838" y2="512" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <!-- Right solar panel arm -->
    <line x1="892" y1="512" x2="922" y2="512" stroke="#B0BEC5" stroke-width="3"/>
    <!-- Right solar panel -->
    <rect x="922" y="501" width="20" height="22" rx="2" fill="url(#panel-grad)" opacity="0.9"/>
    <line x1="932" y1="501" x2="932" y2="523" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <line x1="922" y1="512" x2="942" y2="512" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <!-- Antenna -->
    <line x1="880" y1="500" x2="880" y2="488" stroke="#B0BEC5" stroke-width="2"/>
    <circle cx="880" cy="486" r="3" fill="#E3F2FD"/>
  </g>

  <!-- Satellite 2 - on ring 2 (left side) -->
  <g transform="rotate(40 512 512)">
    <!-- Body -->
    <rect x="148" y="500" width="24" height="24" rx="3" fill="#E3F2FD"/>
    <!-- Left solar panel arm -->
    <line x1="148" y1="512" x2="118" y2="512" stroke="#B0BEC5" stroke-width="3"/>
    <!-- Left solar panel -->
    <rect x="98" y="501" width="20" height="22" rx="2" fill="url(#panel-grad)" opacity="0.9"/>
    <line x1="108" y1="501" x2="108" y2="523" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <line x1="98" y1="512" x2="118" y2="512" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <!-- Right solar panel arm -->
    <line x1="172" y1="512" x2="202" y2="512" stroke="#B0BEC5" stroke-width="3"/>
    <!-- Right solar panel -->
    <rect x="202" y="501" width="20" height="22" rx="2" fill="url(#panel-grad)" opacity="0.9"/>
    <line x1="212" y1="501" x2="212" y2="523" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <line x1="202" y1="512" x2="222" y2="512" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <!-- Antenna -->
    <line x1="160" y1="500" x2="160" y2="488" stroke="#B0BEC5" stroke-width="2"/>
    <circle cx="160" cy="486" r="3" fill="#E3F2FD"/>
  </g>

  <!-- Satellite 3 - on ring 3 (right side) -->
  <g transform="rotate(-80 512 512)">
    <!-- Body -->
    <rect x="870" y="502" width="20" height="20" rx="3" fill="#E3F2FD"/>
    <!-- Left solar panel arm -->
    <line x1="870" y1="512" x2="845" y2="512" stroke="#B0BEC5" stroke-width="2.5"/>
    <!-- Left solar panel -->
    <rect x="828" y="503" width="17" height="18" rx="2" fill="url(#panel-grad)" opacity="0.9"/>
    <line x1="836.5" y1="503" x2="836.5" y2="521" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <line x1="828" y1="512" x2="845" y2="512" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <!-- Right solar panel arm -->
    <line x1="890" y1="512" x2="915" y2="512" stroke="#B0BEC5" stroke-width="2.5"/>
    <!-- Right solar panel -->
    <rect x="915" y="503" width="17" height="18" rx="2" fill="url(#panel-grad)" opacity="0.9"/>
    <line x1="923.5" y1="503" x2="923.5" y2="521" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <line x1="915" y1="512" x2="932" y2="512" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <!-- Antenna -->
    <line x1="880" y1="502" x2="880" y2="492" stroke="#B0BEC5" stroke-width="2"/>
    <circle cx="880" cy="490" r="2.5" fill="#E3F2FD"/>
  </g>

  <!-- Satellite 4 - on ring 1 (left side, smaller) -->
  <g transform="rotate(-30 512 512)">
    <!-- Body -->
    <rect x="133" y="503" width="18" height="18" rx="3" fill="#E3F2FD"/>
    <!-- Left solar panel arm -->
    <line x1="133" y1="512" x2="112" y2="512" stroke="#B0BEC5" stroke-width="2"/>
    <!-- Left solar panel -->
    <rect x="97" y="504" width="15" height="16" rx="2" fill="url(#panel-grad)" opacity="0.9"/>
    <line x1="104.5" y1="504" x2="104.5" y2="520" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <line x1="97" y1="512" x2="112" y2="512" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <!-- Right solar panel arm -->
    <line x1="151" y1="512" x2="172" y2="512" stroke="#B0BEC5" stroke-width="2"/>
    <!-- Right solar panel -->
    <rect x="172" y="504" width="15" height="16" rx="2" fill="url(#panel-grad)" opacity="0.9"/>
    <line x1="179.5" y1="504" x2="179.5" y2="520" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <line x1="172" y1="512" x2="187" y2="512" stroke="#E3F2FD" stroke-width="1" opacity="0.5"/>
    <!-- Antenna -->
    <line x1="142" y1="503" x2="142" y2="494" stroke="#B0BEC5" stroke-width="1.5"/>
    <circle cx="142" cy="492" r="2" fill="#E3F2FD"/>
  </g>

  <!-- Subtle glow on globe -->
  <circle cx="440" cy="440" r="120" fill="#ffffff" opacity="0.08"/>
</svg>
