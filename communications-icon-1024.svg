<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="transparent" />
  <defs>
    <linearGradient id="canGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="40%" stop-color="#c8c8c8"/>
      <stop offset="70%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#a8a8a8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="65%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ===== LEFT CAN ===== -->
  <g transform="translate(340, 220) rotate(85, 0, 0)">
    <rect x="-65" y="-110" width="130" height="220" rx="7" ry="7" fill="url(#canGrad)" stroke="#a0a0a0" stroke-width="3"/>
    <rect x="-65" y="-110" width="130" height="220" rx="7" ry="7" fill="url(#shine)"/>
    <ellipse cx="0" cy="-110" rx="65" ry="20" fill="url(#rimGrad)" stroke="#a0a0a0" stroke-width="3"/>
    <ellipse cx="0" cy="-110" rx="48" ry="13" fill="none" stroke="#b8b8b8" stroke-width="2"/>
    <ellipse cx="0" cy="110" rx="65" ry="20" fill="url(#rimGrad)" stroke="#a0a0a0" stroke-width="3"/>
    <line x1="-65" y1="-65" x2="65" y2="-65" stroke="#b8b8b8" stroke-width="1.5" opacity="0.5"/>
    <line x1="-65" y1="-20" x2="65" y2="-20" stroke="#b8b8b8" stroke-width="1.5" opacity="0.5"/>
    <line x1="-65" y1="20" x2="65" y2="20" stroke="#b8b8b8" stroke-width="1.5" opacity="0.5"/>
    <line x1="-65" y1="65" x2="65" y2="65" stroke="#b8b8b8" stroke-width="1.5" opacity="0.5"/>
    <rect x="-65" y="-20" width="130" height="40" fill="#c0c0c0" opacity="0.3"/>
  </g>

  <!-- ===== RIGHT CAN ===== -->
  <g transform="translate(684, 235) rotate(-80, 0, 0)">
    <rect x="-65" y="-110" width="130" height="220" rx="7" ry="7" fill="url(#canGrad)" stroke="#a0a0a0" stroke-width="3"/>
    <rect x="-65" y="-110" width="130" height="220" rx="7" ry="7" fill="url(#shine)"/>
    <ellipse cx="0" cy="-110" rx="65" ry="20" fill="url(#rimGrad)" stroke="#a0a0a0" stroke-width="3"/>
    <ellipse cx="0" cy="-110" rx="48" ry="13" fill="none" stroke="#b8b8b8" stroke-width="2"/>
    <ellipse cx="0" cy="110" rx="65" ry="20" fill="url(#rimGrad)" stroke="#a0a0a0" stroke-width="3"/>
    <line x1="-65" y1="-65" x2="65" y2="-65" stroke="#b8b8b8" stroke-width="1.5" opacity="0.5"/>
    <line x1="-65" y1="-20" x2="65" y2="-20" stroke="#b8b8b8" stroke-width="1.5" opacity="0.5"/>
    <line x1="-65" y1="20" x2="65" y2="20" stroke="#b8b8b8" stroke-width="1.5" opacity="0.5"/>
    <line x1="-65" y1="65" x2="65" y2="65" stroke="#b8b8b8" stroke-width="1.5" opacity="0.5"/>
    <rect x="-65" y="-20" width="130" height="40" fill="#c0c0c0" opacity="0.3"/>
  </g>

  <!-- String knots -->
  <circle cx="450" cy="248" r="5" fill="#a0a0a0" stroke="#909090" stroke-width="2"/>
  <circle cx="576" cy="260" r="5" fill="#a0a0a0" stroke="#909090" stroke-width="2"/>

  <!-- ===== MESSY STRING — organic folds with one nice loop on the right ===== -->
  <path d="M 450 248
           C 445 280, 430 310, 395 340
           C 360 370, 310 360, 280 400
           C 250 440, 270 480, 310 500
           C 350 520, 400 490, 440 470
           C 480 450, 510 430, 530 460
           C 550 490, 500 530, 460 550
           C 420 570, 370 560, 340 590
           C 310 620, 330 670, 380 690
           C 430 710, 490 680, 530 660
           C 570 640, 600 610, 640 630
           C 680 650, 720 690, 740 730
           C 760 770, 730 810, 690 800
           C 650 790, 630 750, 640 710
           C 650 670, 630 640, 600 660
           C 570 680, 540 720, 500 760
           C 460 800, 440 840, 480 860
           C 520 880, 580 850, 630 810
           C 680 770, 710 720, 710 680
           C 710 640, 690 600, 660 570
           C 630 540, 610 510, 630 480
           C 650 450, 680 430, 700 400
           C 720 370, 680 320, 640 300
           C 610 280, 590 268, 576 260"
        fill="none" stroke="#b0b0b0" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
