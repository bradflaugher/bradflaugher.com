<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Launcher</title>
<base target="_blank"/>
<link href="/bookmarks-icon-180.png" rel="apple-touch-icon"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<meta content="Launcher" name="apple-mobile-web-app-title"/>
<meta content="#000000" name="theme-color"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #000000;
    --text: #ffffff;
    --text-muted: #888;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: env(safe-area-inset-top) 2rem env(safe-area-inset-bottom) 2rem;
  }
  .container {
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
  }
  .grid {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }
  .bookmark-item {
    display: flex;
    align-items: center;
  }
  .bookmark-item a {
    color: var(--text);
    text-decoration: none;
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: -0.02em;
    transition: opacity 0.2s;
    display: block;
    width: 100%;
  }
  .bookmark-item a:active {
    opacity: 0.5;
  }
  .bookmark-item .access-link {
    display: none;
  }
  
  /* Category indicator */
  .bookmark-item::before {
    content: '';
    width: 4px;
    height: 4px;
    border-radius: 50%;
    margin-right: 1rem;
    opacity: 0.5;
  }
  .bookmark-item[data-category="listen"]::before { background: #1DB954; }
  .bookmark-item[data-category="news"]::before { background: #E3120B; }
  .bookmark-item[data-category="health"]::before { background: #2664F5; }

  @media (min-width: 600px) {
    .bookmark-item a:hover {
      opacity: 0.7;
    }
  }
</style>
</head>
<body>
<div class="container">
<div class="grid" id="grid">
  <div class="bookmark-item" data-category="health"><a data-app-url="clublocker://" href="https://clublocker.com/organizations/829/reservations/">RCOP</a></div>
  <div class="bookmark-item" data-category="health"><a data-app-url="oura://" href="https://cloud.ouraring.com/dashboard">Oura Ring</a></div>
  <div class="bookmark-item" data-category="health"><a data-app-url="com.solidcore.app://" href="https://www.solidcore.co/book-a-class/">Solidcore</a></div>
  <div class="bookmark-item" data-category="listen"><a data-app-url="spotify://" href="https://open.spotify.com/">Spotify</a></div>
  <div class="bookmark-item" data-category="listen"><a data-app-url="classical://" href="https://music.apple.com/us/curator/apple-music-classical/976439532">Classical</a></div>
  <div class="bookmark-item" data-category="listen"><a data-app-url="kobo://" href="https://www.kobo.com/">Kobo</a></div>
  <div class="bookmark-item" data-category="listen"><a data-app-url="dewey-oauth://" href="https://www.freelibrary.org/">Libby</a></div>
  <div class="bookmark-item" data-category="news"><a data-app-url="com.economist.lamarr://home" href="https://www.economist.com/">The Economist</a></div>
  <div class="bookmark-item" data-category="news"><a data-app-url="twitter://timeline" href="https://x.com/home">X</a></div>
  <div class="bookmark-item" data-category="news"><a data-app-url="nytimes://home" href="https://www.nytimes.com/">NYT</a></div>
</div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const grid = document.getElementById('grid');
    const items = Array.from(document.querySelectorAll('.bookmark-item'));
    const CAT_ORDER = ['listen', 'news', 'health'];
    const CUSTOM = { 
      'news': ['the economist', 'x', 'nytimes'], 
      'listen': ['spotify', 'classical', 'kobo', 'libby'], 
      'health': ['oura ring', 'clublocker', 'solidcore'] 
    };

    items.sort((a, b) => {
      let cA = CAT_ORDER.indexOf(a.dataset.category), cB = CAT_ORDER.indexOf(b.dataset.category);
      if (cA !== cB) return cA - cB;
      let nA = a.textContent.trim().toLowerCase(), nB = b.textContent.trim().toLowerCase();
      let cat = a.dataset.category;
      if (CUSTOM[cat]) {
        let iA = CUSTOM[cat].indexOf(nA), iB = CUSTOM[cat].indexOf(nB);
        if (iA !== -1 && iB !== -1) return iA - iB;
        if (iA !== -1) return -1;
        if (iB !== -1) return 1;
      }
      return nA.localeCompare(nB);
    });
    items.forEach(item => grid.appendChild(item));

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      grid.addEventListener('click', e => {
        const a = e.target.closest('a[data-app-url]');
        if (!a) return;
        e.preventDefault();
        window.location.href = a.dataset.appUrl;
        const web = a.getAttribute('href');
        if (web && web !== '#') {
          setTimeout(() => { 
            if (document.visibilityState !== 'hidden') window.location.href = web; 
          }, 1500);
        }
      });
    }
  });
</script>
</body>
</html>
