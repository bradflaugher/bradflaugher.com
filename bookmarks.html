<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Bookmarks</title>
<base target="_blank"/>
<link href="/bookmarks.webmanifest" rel="manifest"/>
<link href="/bookmarks-icon-180.png" rel="apple-touch-icon"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<meta content="Bookmarks" name="apple-mobile-web-app-title"/>
<meta content="#0f0f0f" name="theme-color"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface-hover: #242424;
    --border: #2a2a2a;
    --text: #e4e4e4;
    --text-muted: #888;
    --accent: var(--text);
    --accent-dim: rgba(110, 142, 251, 0.08);
    --personal: var(--text-muted);

    /* Category colors */
    --cat-news: #60a5fa;
    --cat-health: #34d399;
    --cat-listen: #f472b6;
    --cat-shopping: #a8a29e;
    --cat-ai: #a78bfa;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    touch-action: manipulation;
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
    /* Safe area insets for iPhone notch / Dynamic Island */
    padding-top: env(safe-area-inset-top);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 1.25rem 1.5rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  /* Unified search + filter component */
  .search-area {
    max-width: 440px;
    margin: 0 auto;
  }

  .search-filter-unit {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .search-filter-unit:focus-within {
    border-color: var(--accent);
  }

  .search-input-wrap {
    position: relative;
  }

  .search-input-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--text-muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    padding: 0.7rem 1rem 0.7rem 2.5rem;
    border: none;
    background: var(--surface);
    color: var(--text);
    font-size: 1rem;
    font-family: inherit;
    outline: none;
  }

  #search::placeholder { color: var(--text-muted); }


  .web-search-row {
    display: flex;
    border-top: 1px solid var(--border);
  }

  .web-btn {
    flex: 1;
    padding: 0.6rem 0;
    border: none;
    border-right: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.3rem;
  }

  .web-btn:last-child {
    border-right: none;
  }

  .web-btn:hover {
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* Smart suggestions */











  /* Grid and cards */

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.5rem;
  }

  .bookmark-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: border-color 0.2s, background 0.15s;
    display: flex;
    align-items: stretch;
    overflow: hidden;
  }

  .bookmark-item.hidden { display: none; }
  .bookmark-item:hover { border-color: #3a3a3a; background: var(--surface-hover); }

  .bookmark-item > a.main-link {
    display: flex;
    align-items: center;
    flex: 1;
    min-width: 0;
    padding: 0.4rem 0.5rem;
    color: var(--text);
    text-decoration: none;
    font-size: 0.8rem;
    border-radius: 8px;
  }

  .bookmark-item > a.main-link:hover {
    color: var(--text);
  }

  .bookmark-item a .domain {
    display: none;
  }

  .bookmark-item a .name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 0.4rem; }
    .bookmark-item > a.main-link { padding: 0.6rem 0.5rem; font-size: 0.9rem; }
  }


















  /* Monochrome SVG context icons */
  .ctx-icon {
    display: inline-block;
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    margin-right: 0.4rem;
    vertical-align: middle;
  }

  li[data-ctx="personal"] .ctx-icon { color: var(--personal); }
  /* "both" icons use stroke="url(#both-grad)" defined inline */

  /* Category-based coloring for bookmark text and icons */
  .bookmark-item[data-category="news"] > a.main-link { color: var(--cat-news); }
  .bookmark-item[data-category="news"] .ctx-icon { color: var(--cat-news); }
  .bookmark-item[data-category="health"] > a.main-link { color: var(--cat-health); }
  .bookmark-item[data-category="health"] .ctx-icon { color: var(--cat-health); }
  .bookmark-item[data-category="calendars"] > a.main-link { color: var(--cat-calendars); }
  .bookmark-item[data-category="calendars"] .ctx-icon { color: var(--cat-calendars); }
  .bookmark-item[data-category="todos"] > a.main-link { color: var(--cat-todos); }
  .bookmark-item[data-category="todos"] .ctx-icon { color: var(--cat-todos); }
  .bookmark-item[data-category="listen"] > a.main-link { color: var(--cat-listen); }
  .bookmark-item[data-category="listen"] .ctx-icon { color: var(--cat-listen); }
  .bookmark-item[data-category="shopping"] > a.main-link { color: var(--cat-shopping); }
  .bookmark-item[data-category="shopping"] .ctx-icon { color: var(--cat-shopping); }
  .bookmark-item[data-category="ai"] > a.main-link { color: var(--cat-ai); }
  .bookmark-item[data-category="ai"] .ctx-icon { color: var(--cat-ai); }







  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 0.9rem;
    display: none;
  }

  .no-results.visible { display: block; }

  @media (max-width: 600px) {
    .hide-on-mobile { display: none !important; }
    .container { padding: 1rem 1rem 3rem; }
    header { margin-bottom: 1.25rem; }






    .web-btn { padding: 0.6rem 0; font-size: 0.9rem; }




    /* Mobile collapse/expand */













  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f5f5;
      --surface: #fff;
      --surface-hover: #fafafa;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --text-muted: #777;
      --accent: var(--text);
      --accent-dim: rgba(74, 108, 247, 0.06);
      --personal: var(--text-muted);

      /* Category colors (light mode - slightly deeper) */
      --cat-news: #2563eb;
      --cat-health: #059669;
      --cat-listen: #db2777;
      --cat-shopping: #78716c;
      --cat-ai: #8b5cf6;
    }
  }
</style>
</head>

<div class="no-results" id="no-results">No bookmarks match your search.</div>
</div>
</div>
<script>
  const search = document.getElementById('search');
  const items = document.querySelectorAll('.bookmark-item');
  const noResults = document.getElementById('no-results');

  // Live bookmark filtering
  search.addEventListener('input', applyFilters);

function applyFilters() {
    const q = search.value.toLowerCase().trim();
    let anyVisible = false;



    const items = document.querySelectorAll('.bookmark-item');
    items.forEach(item => {
      let searchMatch = true;
      if (q) {
        const text = item.textContent.toLowerCase();
        const href = item.querySelector('a')?.href.toLowerCase() || '';
        const category = item.dataset.category || '';
        searchMatch = text.includes(q) || href.includes(q) || category.includes(q);
      }
      item.classList.toggle('hidden', !searchMatch);
      if (searchMatch) anyVisible = true;
    });

    noResults.classList.toggle('visible', !anyVisible);
  }

  // Focus management
  if (!('ontouchstart' in window)) search.focus();

  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== search) {
      e.preventDefault();
      search.focus();
    }
    if (e.key === 'Escape') {
      search.value = '';
      search.dispatchEvent(new Event('input'));
      search.blur();
    }
  });

  // Enter key triggers DDG web search
  search.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const q = search.value.trim();
      if (q) doSearch('ddg-html');
    }
  });

  // Clear search after visiting a result (desktop links open in _blank, page stays open)
  document.getElementById('grid').addEventListener('click', function(e) {
    var link = e.target.closest('a');
    if (!link) return;
    // Only clear if there's actually a search query active
    if (!search.value.trim()) return;
    // Small delay so the link fires before we reset the UI
    setTimeout(function() {
      search.value = '';
      applyFilters();
    }, 100);
  });

  // Web search
  function doSearch(engine) {
    const q = search.value.trim();
    if (!q) { search.focus(); return; }
    const enc = encodeURIComponent(q);

    if (engine === 'maps' && /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var mapsApp = /Android/i.test(navigator.userAgent)
        ? 'geo:0,0?q=' + enc
        : 'comgooglemaps://?q=' + enc;
      window.location.href = mapsApp;
      search.value = '';
      applyFilters();
      setTimeout(function() {
        if (document.visibilityState !== 'hidden') {
          window.open('https://maps.google.com/maps?q=' + enc, '_blank');
        }
      }, 1500);
      return;
    }

    var urls = {
      'ddg-html':    'https://html.duckduckgo.com/html/?q=' + enc,
      'bing-images': 'https://www.bing.com/images/search?q=' + enc,
      'maps':        'https://maps.google.com/maps?q=' + enc,
      'brave-ai':    'https://search.brave.com/ask?q=' + enc + '&source=llmSuggest'
    };
    window.open(urls[engine], '_blank');
    search.value = '';
    applyFilters();
  }

  // Web search buttons
  document.querySelectorAll('.web-btn').forEach(btn => {
    btn.addEventListener('click', () => doSearch(btn.dataset.engine));
  });


  // Sort bookmarks by category, then alphabetically within each category
  (function() {
    var categoryOrder = [
      'ai', 'news', 'listen', 'health', 'shopping'
    ];

    var customOrder = {
      'ai': ['claude', 'google gemini', 'grok'],
      'news': ['the economist', 'philly', 'mit', 'nyt', 'x', 'polymarket'],
      'listen': ['spotify', 'libby', 'youtube'],
      'health': ['oura ring', 'clublocker', 'solidcore'],
      'shopping': ['keep']
    };

    var grid = document.getElementById('grid');
    var items = Array.from(document.querySelectorAll('.bookmark-item'));
    var noResults = document.getElementById('no-results');

    items.sort(function(a, b) {
      var catA = categoryOrder.indexOf(a.dataset.category);
      var catB = categoryOrder.indexOf(b.dataset.category);
      if (catA === -1) catA = 999;
      if (catB === -1) catB = 999;
      if (catA !== catB) return catA - catB;

      var nameA = a.querySelector('.name').textContent.trim().toLowerCase();
      var nameB = b.querySelector('.name').textContent.trim().toLowerCase();

      var cat = a.dataset.category;
      if (customOrder[cat]) {
        var indexA = customOrder[cat].indexOf(nameA);
        var indexB = customOrder[cat].indexOf(nameB);
        if (indexA === -1) indexA = 999;
        if (indexB === -1) indexB = 999;
        if (indexA !== indexB) return indexA - indexB;
      }

      return nameA.localeCompare(nameB);
    });

    items.forEach(function(item) {
      grid.insertBefore(item, noResults);
    });

    var mob = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (mob) {
      document.getElementById('grid').addEventListener('click', function(e) {
        var link = e.target.closest('a[data-app-url]');
        if (!link) return;

        e.preventDefault();
        var appUrl = link.dataset.appUrl;
        var webUrl = link.href;
        window.location.href = appUrl;
        setTimeout(function() {
          if (document.visibilityState !== 'hidden') {
            window.location.href = webUrl;
          }
        }, 1500);
      });
    }
  })();


  // Mobile: tap card header to toggle expand/collapse.
  // With touch-action:manipulation on body, click fires instantly (no 300ms delay).
  // Each h2 gets its own handler — simple, direct, no delegation complexity.

</script>
</body>
</html>
