<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Search</title>
<link href="/search.webmanifest" rel="manifest"/>
<link href="/favicon-32x32.png" rel="icon" type="image/png"/>
<link href="/favicon-144x144.png" rel="apple-touch-icon"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<meta content="#000000" name="theme-color" id="theme-color"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #000000;
    --text: #ffffff;
    --text-muted: #666;
    --accent: #ffffff;
    --engine-color: transparent;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --text: #000000;
      --text-muted: #999;
      --accent: #000000;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: env(safe-area-inset-top) 2rem env(safe-area-inset-bottom) 2rem;
    transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--engine-color);
    opacity: 0.05;
    pointer-events: none;
    transition: background 0.8s ease;
  }
  .container {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
  }
  .input-wrap {
    position: relative;
  }
  #search {
    width: 100%;
    padding: 1.5rem 0;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: clamp(1.5rem, 5vw, 3rem);
    font-weight: 200;
    outline: none;
    letter-spacing: -0.05em;
    transition: all 0.3s;
  }
  .engine-hint {
    position: absolute;
    bottom: -1.5rem;
    left: 0;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0;
    transform: translateY(5px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .engine-hint.active {
    opacity: 1;
    transform: translateY(0);
  }
  .routing-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    text-align: center;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .engine-name {
    font-size: 3.5rem;
    font-weight: 100;
    letter-spacing: -0.06em;
    margin-bottom: 2rem;
  }
  .cancel-btn {
    background: transparent;
    border: 1px solid var(--text-muted);
    color: var(--text-muted);
    padding: 0.6rem 2rem;
    border-radius: 30px;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    margin-top: 3rem;
    transition: all 0.2s;
  }
  .cancel-btn:hover {
    color: var(--text);
    border-color: var(--text);
    background: rgba(255,255,255,0.05);
  }
  .progress-bar {
    width: 240px;
    height: 1px;
    background: var(--text-muted);
    position: relative;
    overflow: hidden;
    opacity: 0.2;
  }
  .progress-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 0%;
    background: var(--text);
    transition: width 1.5s linear;
  }
</style>
</head>
<body>
<div class="container">
  <div class="input-wrap">
    <input autocomplete="off" id="search" placeholder="Type to search..." type="text" autofocus/>
    <div class="engine-hint" id="hint">DuckDuckGo</div>
  </div>
</div>

<div class="routing-overlay" id="overlay">
  <div class="engine-name" id="engine-display">DuckDuckGo</div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <button class="cancel-btn" id="cancel">Cancel</button>
</div>

<script>
  let routeTimer = null;
  const search = document.getElementById('search');
  const hint = document.getElementById('hint');
  const overlay = document.getElementById('overlay');
  const display = document.getElementById('engine-display');
  const progress = document.getElementById('progress');
  const cancel = document.getElementById('cancel');

  const engines = {
    'ddg': { name: 'DuckDuckGo', color: '#DE5833', url: q => `https://html.duckduckgo.com/html/?q=${q}` },
    'bing-images': { name: 'Bing Images', color: '#008373', url: q => `https://www.bing.com/images/search?q=${q}` },
    'perplexity': { name: 'Perplexity', color: '#20B2AA', url: q => `https://www.perplexity.ai/search?q=${q}` },
    'grok': { name: 'Grok', color: '#ffffff', url: q => `https://grok.com/?q=${q}` },
    'maps': { name: 'Google Maps', color: '#4285F4', url: q => `https://maps.google.com/maps?q=${q}` },
    'youtube': { name: 'YouTube', color: '#FF0000', url: q => `https://www.youtube.com/results?search_query=${q}` },
    'amazon': { name: 'Amazon', color: '#FF9900', url: q => `https://www.amazon.com/s?k=${q}` },
    'direct': { name: 'Direct Link', color: '#00ff00', url: q => q.startsWith('http') ? q : `https://${q}` }
  };

  const getEngineKey = (q) => {
    const query = q.toLowerCase().trim();
    if (!query) return 'ddg';

    // 1. Absolute Overrides
    if (query.startsWith('!')) {
      const cmd = query.split(' ')[0].slice(1);
      const cmdMap = {
        'yt': 'youtube', 'y': 'youtube',
        'a': 'amazon', 'amz': 'amazon',
        'm': 'maps', 'map': 'maps', 'i': 'bing-images', 'img': 'bing-images',
        'p': 'perplexity', 'px': 'perplexity', 'g': 'grok', 'gr': 'grok',
        'd': 'ddg', 'ddg': 'ddg'
      };
      if (cmdMap[cmd]) return cmdMap[cmd];
    }
    if (/^[a-z0-9]+([\-\.]{1}[a-z0-9]+)*\.[a-z]{2,10}(:[0-9]{1,5})?(\/.*)?$/i.test(query) && !query.includes(' ')) return 'direct';

    const words = query.split(/\s+/);
    const isLong = query.length > 50 || words.length > 8;

    // 2. Specialized Detectors (High Confidence)
    
    // Video (YouTube)
    const videoOnly = ['trailer', 'movie', 'vlog', 'gameplay', 'highlights', 'music video', 'tutorial'];
    if (videoOnly.some(v => query.includes(v))) return 'youtube';
    if (query.startsWith('how to') || (query.includes('how to') && (words.includes('fix') || words.includes('build') || words.includes('install') || words.includes('video') || words.includes('make') || words.includes('bake')))) return 'youtube';

    // Navigation/Local (Maps)
    const mapPhrases = ['near me', 'directions to', 'how to get to', 'address of', 'nearest', 'nearby', 'distance to', 'where is'];
    if (mapPhrases.some(p => query.includes(p))) return 'maps';
    if (words.includes('address')) return 'maps';
    if (words.includes('in') && words.length > 2 && (words.indexOf('in') === words.length - 2 || words.indexOf('in') === words.length - 3)) {
       const locations = ['london', 'nyc', 'new york', 'sf', 'san francisco', 'philly', 'paris', 'tokyo', 'berlin', 'rome', 'madrid'];
       if (locations.some(l => query.includes(l))) return 'maps';
    }
    if (/\d+\s+[a-z]+/.test(query) && (query.includes(' st') || query.includes(' street') || query.includes(' ave') || query.includes(' rd'))) return 'maps';

    // 3. Weighted Scoring (Nuanced Intent)
    const scores = { ddg: 2, maps: 0, grok: 0, perplexity: 0, youtube: 0, amazon: 0, 'bing-images': 0 };

    // Maps Scoring
    const mapKeywords = ['restaurant', 'hotel', 'park', 'cafe', 'pizza', 'airport', 'museum', 'st', 'ave', 'rd', 'street', 'road', 'city', 'bar', 'pub', 'food', 'address', 'map', 'directions'];
    words.forEach(w => { if (mapKeywords.includes(w)) scores.maps += 10; });

    // Grok Scoring (Hot Goss / Trends / Timeliness)
    const grokPhrases = ['whats the latest', 'what happened', 'happening', 'hot goss', 'the tea', 'people saying', 'talking about', 'rumors', 'drama', 'breaking news', 'latest with', 'just happened', 'last night', 'this morning'];
    const grokKeywords = ['elon', 'musk', 'openai', 'trump', 'biden', 'politics', 'crypto', 'trending', 'viral', 'reddit', 'tiktok', 'instagram', 'twitter', 'x', 'scandal', 'leak', 'election', 'score', 'game', 'news', 'yesterday', 'today', 'tonight'];
    grokPhrases.forEach(p => { if (query.includes(p)) scores.grok += 25; });
    words.forEach(w => { if (grokKeywords.includes(w)) scores.grok += 15; });
    if (query.includes('latest')) scores.grok += 20;

    // Perplexity Scoring (Research)
    const resPhrases = ['explain', 'research', 'deep dive', 'summarize', 'difference between', 'how does', 'why does', 'history of', 'science of', 'biography of'];
    const resKeywords = ['relationship', 'impact', 'theory', 'study', 'process', 'mechanism', 'evolution', 'discovery', 'meaning', 'concept', 'best', 'compare', 'comparison', 'implementation', 'code', 'npm', 'github'];
    resPhrases.forEach(p => { if (query.includes(p)) scores.perplexity += 25; });
    words.forEach(w => { if (resKeywords.includes(w)) scores.perplexity += 15; });
    if (query.includes(' vs ')) scores.perplexity += 20;
    if (query.includes('?')) scores.perplexity += 10;
    if (query.startsWith('who is')) scores.perplexity += 40;
    if (query.startsWith('what is') && isLong) scores.perplexity += 30;

    // AI Boost for long queries
    if (isLong) {
      if (scores.grok > scores.perplexity) {
        scores.grok += 30;
      } else {
        scores.perplexity += 30;
      }
    }

    // Bing Images
    const imgKeywords = ['image', 'pic', 'photo', 'gif', 'svg', 'png', 'jpg', 'wallpaper', 'logo', 'images', 'pics', 'photos'];
    words.forEach(w => { if (imgKeywords.includes(w)) scores['bing-images'] += 20; });

    // Shopping (Amazon)
    const shopKeywords = ['buy', 'price', 'shop', 'amazon', 'order', 'deal', 'sale', 'purchase'];
    words.forEach(w => { if (shopKeywords.includes(w)) scores.amazon += 20; });
    if (query.startsWith('buy')) scores.amazon += 30;

    // Winner detection
    let winner = 'ddg';
    let maxScore = 0;
    for (const [engine, score] of Object.entries(scores)) {
      if (score > maxScore) { maxScore = score; winner = engine; }
    }
    
    // Safety & Refinement
    if (words.length === 1 && (words[0] === 'reddit' || words[0] === 'twitter' || words[0] === 'x')) return 'ddg';
    if (maxScore < 10 && !isLong) return 'ddg';

    return winner;
  };

  const updateHint = () => {
    const q = search.value.trim();
    if (!q) {
      hint.classList.remove('active');
      document.documentElement.style.setProperty('--engine-color', 'transparent');
      return;
    }
    const key = getEngineKey(q);
    const engine = engines[key];
    hint.textContent = engine.name;
    hint.classList.add('active');
    document.documentElement.style.setProperty('--engine-color', engine.color);
  };

  const performRoute = (q, immediate = false) => {
    if (!q) return;
    const key = getEngineKey(q);
    const target = engines[key];
    
    // Strip bang command from query if present
    let finalQuery = q;
    if (q.trim().startsWith('!')) {
      const parts = q.trim().split(/\s+/);
      if (parts.length > 1) {
        finalQuery = parts.slice(1).join(' ');
      }
    }
    
    const enc = encodeURIComponent(finalQuery.trim());

    if (immediate) {
      window.location.replace(target.url(key === 'direct' ? finalQuery.trim() : enc));
      return;
    }

    display.textContent = target.name;
    overlay.style.display = 'flex';
    search.blur();

    setTimeout(() => { progress.style.width = '100%'; }, 50);
    routeTimer = setTimeout(() => {
      window.location.replace(target.url(key === 'direct' ? finalQuery.trim() : enc));
    }, 1500);
  };

  const placeholders = [
    'Type to search...',
    '2 + 2 * 42',
    'pizza near me',
    '!yt lofi hip hop',
    'explain quantum gravity',
    'github.com',
    'image of a black hole',
    'latest AI news',
    '!gh gemini-cli'
  ];
  let pIdx = 0;
  setInterval(() => {
    if (!search.value) {
      pIdx = (pIdx + 1) % placeholders.length;
      search.placeholder = placeholders[pIdx];
    }
  }, 3000);

  search.addEventListener('input', updateHint);
  search.addEventListener('keydown', e => {
    if (e.key === 'Enter') performRoute(search.value);
  });

  cancel.addEventListener('click', () => {
    clearTimeout(routeTimer);
    overlay.style.display = 'none';
    progress.style.width = '0%';
    search.focus();
  });
  
  const q = new URLSearchParams(window.location.search).get('q');
  if (q) performRoute(q, true);
</script>
</body>
</html>
