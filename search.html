<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Search</title>
<link href="/search.webmanifest" rel="manifest"/>
<link href="/favicon-32x32.png" rel="icon" type="image/png"/>
<link href="/favicon-144x144.png" rel="apple-touch-icon"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<meta content="#000000" name="theme-color" id="theme-color"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #000000;
    --text: #ffffff;
    --text-muted: #666;
    --accent: #ffffff;
    --engine-color: transparent;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --text: #000000;
      --text-muted: #999;
      --accent: #000000;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: env(safe-area-inset-top) 2rem env(safe-area-inset-bottom) 2rem;
    transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--engine-color);
    opacity: 0.05;
    pointer-events: none;
    transition: background 0.8s ease;
  }
  .container {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
  }
  .input-wrap {
    position: relative;
  }
  #search {
    width: 100%;
    padding: 1.5rem 0;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: clamp(1.5rem, 5vw, 3rem);
    font-weight: 200;
    outline: none;
    letter-spacing: -0.05em;
    transition: all 0.3s;
  }
  .engine-hint {
    position: absolute;
    bottom: -1.5rem;
    left: 0;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0;
    transform: translateY(5px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .engine-hint.active {
    opacity: 1;
    transform: translateY(0);
  }
  .routing-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    text-align: center;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .engine-name {
    font-size: 3.5rem;
    font-weight: 100;
    letter-spacing: -0.06em;
    margin-bottom: 2rem;
  }
  .cancel-btn {
    background: transparent;
    border: 1px solid var(--text-muted);
    color: var(--text-muted);
    padding: 0.6rem 2rem;
    border-radius: 30px;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    margin-top: 3rem;
    transition: all 0.2s;
  }
  .cancel-btn:hover {
    color: var(--text);
    border-color: var(--text);
    background: rgba(255,255,255,0.05);
  }
  .progress-bar {
    width: 240px;
    height: 1px;
    background: var(--text-muted);
    position: relative;
    overflow: hidden;
    opacity: 0.2;
  }
  .progress-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 0%;
    background: var(--text);
    transition: width 1.5s linear;
  }
  .status-dot {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    opacity: 0.3;
    transition: all 0.3s;
  }
  .status-dot.ready {
    background: #00ff00;
    opacity: 0.6;
    box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
  }
  .scores-panel {
    position: fixed;
    bottom: 2rem;
    left: 2rem;
    font-size: 0.7rem;
    font-family: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", monospace;
    color: var(--text-muted);
    opacity: 0;
    transform: translateY(5px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 50;
    line-height: 1.6;
    pointer-events: none;
  }
  .scores-panel.active {
    opacity: 1;
    transform: translateY(0);
  }
  .scores-panel .score-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .scores-panel .score-bar {
    width: 60px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }
  .scores-panel .score-fill {
    height: 100%;
    background: var(--text-muted);
    transition: width 0.3s ease;
  }
  .scores-panel .score-fill.best {
    background: var(--text);
  }
  .scores-panel .score-label {
    width: 70px;
    text-align: right;
  }
  .scores-panel .score-val {
    width: 35px;
    text-align: right;
  }
  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    text-align: center;
  }
  .loading-overlay.active {
    display: flex;
  }
  .loading-text {
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }
  .loading-spinner {
    width: 24px;
    height: 24px;
    border: 1px solid var(--text-muted);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-dot.failed {
    background: #ff3b30;
    opacity: 0.8;
    box-shadow: 0 0 10px rgba(255, 59, 48, 0.3);
  }
  .error-banner {
    position: fixed;
    top: 1rem;
    left: 50%;
    transform: translateX(-50%);
    max-width: 90vw;
    padding: 0.6rem 1rem;
    border-radius: 6px;
    background: rgba(255, 59, 48, 0.12);
    border: 1px solid rgba(255, 59, 48, 0.4);
    color: #ff3b30;
    font-size: 0.85rem;
    font-weight: 500;
    display: none;
    z-index: 150;
  }
  .error-banner.active { display: block; }
</style>
</head>
<body>
<div class="container">
  <div class="input-wrap">
    <input autocomplete="off" id="search" placeholder="Type to search..." type="text" autofocus/>
    <div class="engine-hint" id="hint">DuckDuckGo</div>
  </div>
</div>

<div class="routing-overlay" id="overlay">
  <div class="engine-name" id="engine-display">DuckDuckGo</div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <button class="cancel-btn" id="cancel">Cancel</button>
</div>

<div class="status-dot" id="status" data-state="loading" title="Embedding Model Loading..."></div>

<div class="scores-panel" id="scores"></div>

<div class="error-banner" id="error-banner" role="alert"></div>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading model...</div>
</div>

<script type="module">
  import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.2.4';

  // ───────────────────────────────────────────────────────────────────────
  // Config
  //
  // We ship a single quantized ONNX file (model_quantized.onnx, ~22 MB).
  // dtype: 'q8' tells transformers.js v3 to load that exact filename.
  // Using any other dtype (e.g. 'fp32' → model.onnx) would 404; on
  // Cloudflare Pages a 404 is served as HTML, which the ONNX runtime
  // then tries to parse as protobuf and fails with the cryptic
  // "Failed to load model because protobuf parsing failed" error.
  // ───────────────────────────────────────────────────────────────────────
  env.allowLocalModels = true;
  env.allowRemoteModels = false;
  env.localModelPath = '/models/';
  env.useBrowserCache = true;

  const MODEL_ID = 'sentence-transformers/all-MiniLM-L6-v2';
  const MODEL_DTYPE = 'q8';
  const EMBEDDINGS_URL = '/search-embeddings.json';
  const SIMILARITY_THRESHOLD = 0.30;   // below this, fall back to DuckDuckGo
  const ROUTE_DELAY_MS = 1500;         // user-cancelable delay before redirect (Enter)
  const INPUT_DEBOUNCE_MS = 150;

  const engines = {
    'ddg':         { name: 'DuckDuckGo',    color: '#DE5833', url: q => `https://html.duckduckgo.com/html/?q=${q}` },
    'bing-images': { name: 'Bing Images',   color: '#008373', url: q => `https://www.bing.com/images/search?q=${q}` },
    'perplexity':  { name: 'Perplexity',    color: '#20B2AA', url: q => `https://www.perplexity.ai/search?q=${q}` },
    'grok':        { name: 'Grok',          color: '#ffffff', url: q => `https://grok.com/?q=${q}` },
    'maps':        { name: 'Google Maps',   color: '#4285F4', url: q => `https://maps.google.com/maps?q=${q}` },
    'youtube':     { name: 'YouTube',       color: '#FF0000', url: q => `https://www.youtube.com/results?search_query=${q}` },
    'amazon':      { name: 'Amazon',        color: '#FF9900', url: q => `https://www.amazon.com/s?k=${q}` },
    'github':      { name: 'GitHub',        color: '#333',    url: q => `https://github.com/search?q=${q}` },
    'wolfram':     { name: 'Wolfram Alpha', color: '#DA0E1A', url: q => `https://www.wolframalpha.com/input/?i=${q}` },
    'direct':      { name: 'Direct Link',   color: '#00ff00', url: q => q.startsWith('http') ? q : `https://${q}` }
  };

  // Bang shortcuts (always win over semantic routing)
  const BANG_MAP = {
    yt: 'youtube',     y: 'youtube',
    a: 'amazon',       amz: 'amazon',
    m: 'maps',         map: 'maps',
    i: 'bing-images',  img: 'bing-images',
    p: 'perplexity',   px: 'perplexity',
    g: 'grok',         gr: 'grok',
    gh: 'github',      git: 'github',
    w: 'wolfram',      wa: 'wolfram',
    d: 'ddg',          ddg: 'ddg'
  };

  const DOMAIN_RE    = /^[a-z0-9]+([\-\.][a-z0-9]+)*\.[a-z]{2,10}(:[0-9]{1,5})?(\/.*)?$/i;
  const LOCALHOST_RE = /^localhost(:[0-9]{1,5})?(\/.*)?$/i;

  // ───────────────────────────────────────────────────────────────────────
  // DOM
  // ───────────────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const search         = $('search');
  const hint           = $('hint');
  const overlay        = $('overlay');
  const display        = $('engine-display');
  const progress       = $('progress');
  const cancel         = $('cancel');
  const statusDot      = $('status');
  const loadingOverlay = $('loading');
  const scoresPanel    = $('scores');
  const errorBanner    = $('error-banner');

  // ───────────────────────────────────────────────────────────────────────
  // State
  // ───────────────────────────────────────────────────────────────────────
  let extractor = null;
  let routes = [];                                       // [{ key, vectors: Float32Array[] }]
  let modelReady = false;
  let modelFailed = false;
  let routeTimer = null;
  const qParam = new URLSearchParams(location.search).get('q');
  const isRedirecting = qParam !== null;

  // ───────────────────────────────────────────────────────────────────────
  // Model + embeddings loader
  // ───────────────────────────────────────────────────────────────────────
  async function initModel() {
    loadingOverlay.classList.add('active');
    try {
      console.log('Search router: initializing…');

      const [embeddingsResp, model] = await Promise.all([
        fetch(EMBEDDINGS_URL),
        pipeline('feature-extraction', MODEL_ID, { dtype: MODEL_DTYPE })
      ]);

      if (!embeddingsResp.ok) {
        throw new Error(`Failed to load embeddings (${embeddingsResp.status})`);
      }
      const raw = await embeddingsResp.json();
      if (!Array.isArray(raw) || raw.length === 0) {
        throw new Error('Embeddings file is empty or malformed');
      }

      // Convert to typed arrays once. Vectors are L2-normalized at build
      // time, so cosine similarity == dot product (no per-query sqrt).
      routes = raw.map(r => ({
        key: r.key,
        vectors: r.vectors.map(v => Float32Array.from(v))
      }));
      extractor = model;
      modelReady = true;

      statusDot.classList.add('ready');
      statusDot.dataset.state = 'ready';
      statusDot.title = 'Embedding Model Ready';

      const total = routes.reduce((n, r) => n + r.vectors.length, 0);
      console.log(`Search router: ready (${routes.length} routes, ${total} vectors)`);

      if (!isRedirecting) loadingOverlay.classList.remove('active');
      updateHint();
    } catch (err) {
      modelFailed = true;
      statusDot.classList.add('failed');
      statusDot.dataset.state = 'failed';
      statusDot.title = 'Embedding Model Failed: ' + err.message;
      errorBanner.textContent = 'Semantic routing unavailable — falling back to DuckDuckGo. (' + err.message + ')';
      errorBanner.classList.add('active');
      console.error('Search router: init failed', err);
      loadingOverlay.classList.remove('active');
    }
  }

  // ───────────────────────────────────────────────────────────────────────
  // Routing
  // ───────────────────────────────────────────────────────────────────────

  /**
   * Dot product. Inputs MUST both be L2-normalized — then this equals
   * cosine similarity. We assert that on the route side at load time
   * (vectors come from a build-time pipeline with normalize=true) and
   * on the query side via `normalize: true` in the extractor call.
   */
  function dot(a, b) {
    const len = a.length;
    let s = 0;
    for (let i = 0; i < len; i++) s += a[i] * b[i];
    return s;
  }

  /**
   * Score a query against every route. Each route's score is the *max*
   * similarity over its example vectors (nearest-neighbor pooling — more
   * robust than averaging when example phrasings vary widely).
   */
  function scoreAll(qVec) {
    const scores = new Array(routes.length);
    for (let i = 0; i < routes.length; i++) {
      const vecs = routes[i].vectors;
      let best = -1;
      for (let j = 0; j < vecs.length; j++) {
        const s = dot(qVec, vecs[j]);
        if (s > best) best = s;
      }
      scores[i] = { key: routes[i].key, score: best };
    }
    scores.sort((a, b) => b.score - a.score);
    return scores;
  }

  function classifyRules(query) {
    if (query.startsWith('!')) {
      const cmd = query.split(' ', 1)[0].slice(1);
      if (BANG_MAP[cmd]) return BANG_MAP[cmd];
    }
    if (!query.includes(' ') && (DOMAIN_RE.test(query) || LOCALHOST_RE.test(query))) {
      return 'direct';
    }
    return null;
  }

  /**
   * Returns { key, scores } where `scores` is sorted desc by similarity
   * (or [] when classification was rule-based / model not ready).
   * `staleCheck` is an optional () => boolean; if it ever returns true
   * we abort and return null so the caller can drop a stale result.
   */
  async function classify(rawQuery, staleCheck) {
    const q = rawQuery.toLowerCase().trim();
    if (!q) return { key: 'ddg', scores: [] };

    const ruleKey = classifyRules(q);
    if (ruleKey) return { key: ruleKey, scores: [] };

    if (!modelReady) return { key: 'ddg', scores: [] };

    try {
      const output = await extractor([q], { pooling: 'mean', normalize: true });
      if (staleCheck && staleCheck()) return null;
      const qVec = output.tolist()[0];
      const scores = scoreAll(qVec);
      const top = scores[0];
      const key = top.score >= SIMILARITY_THRESHOLD ? top.key : 'ddg';
      return { key, scores };
    } catch (e) {
      console.error('Inference error', e);
      return { key: 'ddg', scores: [] };
    }
  }

  // ───────────────────────────────────────────────────────────────────────
  // UI updates (always cancellable; latest input wins)
  // ───────────────────────────────────────────────────────────────────────
  let hintSeq = 0;

  function clearHint() {
    hint.classList.remove('active');
    document.documentElement.style.setProperty('--engine-color', 'transparent');
    delete document.body.dataset.engine;
    scoresPanel.classList.remove('active');
    scoresPanel.replaceChildren();
  }

  function renderScores(result) {
    if (!result.scores.length) {
      scoresPanel.classList.remove('active');
      scoresPanel.replaceChildren();
      return;
    }
    // Build with DOM nodes (avoids innerHTML / XSS surface).
    const frag = document.createDocumentFragment();
    for (const s of result.scores) {
      const pct = Math.round(s.score * 100);
      const isBest = s.key === result.key;
      const row = document.createElement('div');
      row.className = 'score-row';
      row.dataset.engine = s.key;
      row.innerHTML =
        `<span class="score-label">${engines[s.key].name}</span>` +
        `<div class="score-bar"><div class="score-fill${isBest ? ' best' : ''}" style="width:${pct}%"></div></div>` +
        `<span class="score-val">${pct}%</span>`;
      frag.appendChild(row);
    }
    scoresPanel.replaceChildren(frag);
    scoresPanel.classList.add('active');
  }

  async function updateHint() {
    const q = search.value.trim();
    const mySeq = ++hintSeq;
    if (!q) { clearHint(); return; }

    const result = await classify(q, () => mySeq !== hintSeq);
    if (!result || mySeq !== hintSeq) return;       // a newer keystroke is in flight

    const engine = engines[result.key];
    hint.textContent = engine.name;
    hint.classList.add('active');
    document.documentElement.style.setProperty('--engine-color', engine.color);
    document.body.dataset.engine = result.key;
    renderScores(result);
  }

  // ───────────────────────────────────────────────────────────────────────
  // Routing / redirect
  // ───────────────────────────────────────────────────────────────────────
  function buildTargetUrl(rawQuery, key) {
    let q = rawQuery.trim();
    if (q.startsWith('!')) {
      const parts = q.split(/\s+/);
      if (parts.length > 1) q = parts.slice(1).join(' ');
    }
    return key === 'direct'
      ? engines.direct.url(q)
      : engines[key].url(encodeURIComponent(q));
  }

  async function performRoute(rawQuery, immediate = false) {
    if (!rawQuery) return;
    const result = await classify(rawQuery);
    const url = buildTargetUrl(rawQuery, result.key);

    if (immediate) {
      location.replace(url);
      return;
    }
    display.textContent = engines[result.key].name;
    overlay.style.display = 'flex';
    search.blur();
    requestAnimationFrame(() => { progress.style.width = '100%'; });
    routeTimer = setTimeout(() => location.replace(url), ROUTE_DELAY_MS);
  }

  // ───────────────────────────────────────────────────────────────────────
  // Event wiring
  // ───────────────────────────────────────────────────────────────────────
  let debounceTimer;
  search.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(updateHint, INPUT_DEBOUNCE_MS);
  });

  search.addEventListener('keydown', e => {
    if (e.key === 'Enter' && search.value.trim()) performRoute(search.value);
  });

  cancel.addEventListener('click', () => {
    clearTimeout(routeTimer);
    routeTimer = null;
    overlay.style.display = 'none';
    progress.style.width = '0%';
    search.focus();
  });

  // Rotating placeholder (decorative)
  const placeholders = [
    'Type to search...', '2 + 2 * 42', 'pizza near me', '!yt lofi hip hop',
    'explain quantum gravity', 'github.com', 'image of a black hole',
    'latest AI news', '!gh gemini-cli', 'integral of x^2', 'distance to moon'
  ];
  let pIdx = 0;
  setInterval(() => {
    if (!search.value && document.activeElement !== search) {
      pIdx = (pIdx + 1) % placeholders.length;
      search.placeholder = placeholders[pIdx];
    }
  }, 3000);

  // ───────────────────────────────────────────────────────────────────────
  // ?q=… auto-redirect entry point
  // ───────────────────────────────────────────────────────────────────────
  if (qParam !== null) {
    const trimmed = qParam.trim();
    if (!trimmed) {
      // Empty query → just show the page.
      loadingOverlay.classList.remove('active');
    } else {
      search.value = trimmed;
      const tryRoute = () => {
        if (modelReady) {
          performRoute(trimmed, true);
        } else if (modelFailed) {
          console.warn('Search router: model failed, falling back to DuckDuckGo');
          location.replace(engines.ddg.url(encodeURIComponent(trimmed)));
        } else {
          setTimeout(tryRoute, 80);
        }
      };
      tryRoute();
    }
  }

  initModel();
</script>
</body>
</html>
