<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Search</title>
<link href="/search.webmanifest" rel="manifest"/>
<link href="/favicon-32x32.png" rel="icon" type="image/png"/>
<link href="/favicon-144x144.png" rel="apple-touch-icon"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<meta content="#000000" name="theme-color" id="theme-color"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #000000;
    --text: #ffffff;
    --text-muted: #666;
    --accent: #ffffff;
    --engine-color: transparent;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --text: #000000;
      --text-muted: #999;
      --accent: #000000;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: env(safe-area-inset-top) 2rem env(safe-area-inset-bottom) 2rem;
    transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--engine-color);
    opacity: 0.05;
    pointer-events: none;
    transition: background 0.8s ease;
  }
  .container {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
  }
  .input-wrap {
    position: relative;
  }
  #search {
    width: 100%;
    padding: 1.5rem 0;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: clamp(1.5rem, 5vw, 3rem);
    font-weight: 200;
    outline: none;
    letter-spacing: -0.05em;
    transition: all 0.3s;
  }
  .engine-hint {
    position: absolute;
    bottom: -1.5rem;
    left: 0;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0;
    transform: translateY(5px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .engine-hint.active {
    opacity: 1;
    transform: translateY(0);
  }
  .routing-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    text-align: center;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .engine-name {
    font-size: 3.5rem;
    font-weight: 100;
    letter-spacing: -0.06em;
    margin-bottom: 2rem;
  }
  .cancel-btn {
    background: transparent;
    border: 1px solid var(--text-muted);
    color: var(--text-muted);
    padding: 0.6rem 2rem;
    border-radius: 30px;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    margin-top: 3rem;
    transition: all 0.2s;
  }
  .cancel-btn:hover {
    color: var(--text);
    border-color: var(--text);
    background: rgba(255,255,255,0.05);
  }
  .progress-bar {
    width: 240px;
    height: 1px;
    background: var(--text-muted);
    position: relative;
    overflow: hidden;
    opacity: 0.2;
  }
  .progress-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 0%;
    background: var(--text);
    transition: width 1.5s linear;
  }
  .status-dot {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    opacity: 0.3;
    transition: all 0.3s;
  }
  .status-dot.ready {
    background: #00ff00;
    opacity: 0.6;
    box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
  }
  .scores-panel {
    position: fixed;
    bottom: 2rem;
    left: 2rem;
    font-size: 0.7rem;
    font-family: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", monospace;
    color: var(--text-muted);
    opacity: 0;
    transform: translateY(5px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 50;
    line-height: 1.6;
    pointer-events: none;
  }
  .scores-panel.active {
    opacity: 1;
    transform: translateY(0);
  }
  .scores-panel .score-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .scores-panel .score-bar {
    width: 60px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }
  .scores-panel .score-fill {
    height: 100%;
    background: var(--text-muted);
    transition: width 0.3s ease;
  }
  .scores-panel .score-fill.best {
    background: var(--text);
  }
  .scores-panel .score-label {
    width: 70px;
    text-align: right;
  }
  .scores-panel .score-val {
    width: 35px;
    text-align: right;
  }
</style>
</head>
<body>
<div class="container">
  <div class="input-wrap">
    <input autocomplete="off" id="search" placeholder="Type to search..." type="text" autofocus/>
    <div class="engine-hint" id="hint">DuckDuckGo</div>
  </div>
</div>

<div class="routing-overlay" id="overlay">
  <div class="engine-name" id="engine-display">DuckDuckGo</div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <button class="cancel-btn" id="cancel">Cancel</button>
</div>

<div class="status-dot" id="status" title="Embedding Model Loading..."></div>

<div class="scores-panel" id="scores"></div>

    { key: 'perplexity', examples: ['detailed comparison between systems', 'summarize the history of world', 'explain the difference between concepts', 'research analysis on technology', 'deep dive into complex topic', 'comprehensive overview of field', 'pros and cons analysis report', 'how does this mechanism work detail', 'scientific explanation of phenomenon', 'educational summary of book', 'long form research query', 'in depth look at', 'explain blockchain technology simply', 'what is quantum computing and how does it work', 'compare capitalism and socialism', 'analyze the causes of world war 1', 'explain the theory of relativity', 'what are the health benefits of intermittent fasting', 'compare react vue and angular frameworks', 'explain how neural networks learn', 'what is the future of artificial intelligence', 'analyze the impact of social media on society', 'explain climate change causes and effects', 'what is the history of the internet', 'compare democracy and authoritarianism', 'explain the process of photosynthesis', 'what are the different types of renewable energy', 'analyze the great depression causes', 'explain how vaccines work in the body', 'what is the history of space exploration', 'compare eastern and western philosophy', 'explain the water cycle in detail', 'what are the causes of inflation', 'analyze the french revolution impact', 'explain how dna replication works', 'what is the history of jazz music', 'compare ios and android ecosystems', 'explain the greenhouse effect', 'what are the principles of design thinking', 'analyze the cold war political tensions', 'explain how electric cars work', 'what is the history of feminism', 'compare sql and nosql databases', 'explain the immune system response', 'what are the different schools of economics', 'analyze the renaissance cultural impact', 'explain how 5g technology works', 'what is the history of human rights', 'compare monolithic and microservices architecture', 'explain the carbon cycle'] },

    { key: 'maps', examples: ['coffee shop near me location', 'directions to the airport drive', 'physical street address finder', 'best restaurants in the city local', 'where is the nearest store', 'navigate to location gps', 'map of the region area', 'distance between two places travel', 'local business listing maps', 'find a place on the map', 'drive to address', 'gps coordinates for', 'restaurant near times square', 'park near my location', 'cafe nearby open now', 'pizza place downtown', 'airport directions from here', 'how to get to brooklyn bridge', 'nearest gas station', 'address of empire state building', 'closest hospital emergency room', 'pharmacy near me open 24 hours', 'walking directions to central park', 'public transit to jfk airport', 'taxi stand near grand central', 'parking garage near me', 'ev charging station nearby', 'atm near me open now', 'bank branch downtown', 'grocery store near my location', 'supermarket open late', 'bakery near me fresh bread', 'butcher shop nearby', 'farmers market this weekend', 'wine bar near me', 'brewery tour nearby', 'distillery tasting room', 'rooftop bar with view', 'speakeasy hidden bar', 'karaoke bar near me', 'comedy club downtown', 'jazz club live music', 'concert venue near me', 'movie theater with recliners', 'arcade bar with games', 'escape room nearby', 'bowling alley near me', 'mini golf course nearby', 'skating rink open now', 'rock climbing gym', 'yoga studio near me', 'crossfit box nearby'] },
    { key: 'youtube', examples: ['how to fix something video tutorial', 'watch movie trailer film', 'video gameplay walkthrough youtube', 'lofi music stream channel', 'vlog episode watch video', 'video tutorial series course', 'funny video clips compilation', 'youtube channel content video', 'watch live video broadcast', 'video of a cat playing', 'tutorial video on', 'watch a video about', 'how to tie a tie', 'how to bake sourdough bread', 'how to change a tire', 'how to play guitar chords', 'how to meditate for beginners', 'how to do a pushup correctly', 'how to make pasta from scratch', 'how to fold a fitted sheet', 'how to speed cube solve rubik', 'how to whistle loudly', 'movie trailer dune part two', 'official music video taylor swift', 'live concert recording full show', 'asmr sleep relaxation video', 'mukbang eating show korean', 'reaction video funny moments', 'unboxing review new iphone', 'day in the life vlog', 'travel vlog japan tokyo', 'study with me live pomodoro', 'coding tutorial python django', 'photography tutorial lighting setup', 'makeup tutorial natural look', 'haircut tutorial at home', 'workout video hiit 20 minutes', 'yoga flow morning routine', 'meditation guided sleep 10 minutes', 'cooking show episode full', 'documentary nature bbc', 'ted talk motivation success', 'podcast video episode full', 'stand up comedy special full', 'magic trick tutorial revealed', 'origami tutorial crane easy', 'drawing tutorial portrait realistic', 'animation tutorial blender 3d', 'game review new release 2024', 'esports tournament finals live', 'speedrun world record any percent', 'lets play minecraft hardcore', 'retro game review snes', 'mobile game review ios android', 'board game review and rules'] },
    { key: 'amazon', examples: ['buy products online store', 'best price for item shopping', 'shopping deals and discounts store', 'order delivery service online', 'product reviews and ratings shop', 'amazon shopping cart checkout', 'purchase electronics online shop', 'shop for clothing deals online', 'buy used books cheap store', 'online store marketplace products', 'buy dog food online', 'best price for a', 'buy wireless earbuds bluetooth', 'order running shoes men size 10', 'purchase yoga mat non slip', 'shop for stainless steel water bottle', 'buy portable phone charger 20000mah', 'order organic green tea bags', 'purchase mechanical keyboard rgb', 'shop for weighted blanket 15 lbs', 'buy noise cancelling headphones sony', 'order instant pot pressure cooker', 'purchase air fryer xl capacity', 'shop for robot vacuum cleaner', 'buy smart watch fitness tracker', 'order bluetooth speaker waterproof', 'purchase external hard drive 2tb', 'shop for gaming mouse wireless', 'buy led desk lamp with usb port', 'order memory foam pillow king', 'purchase electric toothbrush rechargeable', 'shop for coffee maker programmable', 'buy standing desk adjustable height', 'order resistance bands set workout', 'purchase foam roller for muscles', 'shop for sunscreen spf 50', 'buy vitamin d3 supplements 5000 iu', 'order protein powder whey isolate', 'purchase creatine monohydrate powder', 'shop for fish oil omega 3', 'buy multivitamin for women', 'order melatonin 5mg sleep aid', 'purchase probiotics digestive health', 'shop for collagen peptides powder', 'buy essential oil diffuser ultrasonic', 'order scented candles soy wax', 'purchase bath bombs gift set', 'shop for shower caddy organizer', 'buy microfiber cleaning cloths pack', 'order laundry detergent pods hypoallergenic', 'purchase dish soap refill eco friendly', 'shop for trash bags 13 gallon', 'buy paper towels bulk pack'] },
    { key: 'github', examples: ['source code repository project', 'github project repo code', 'open source software library git', 'npm package code modules', 'coding script repository dev', 'git clone repo command', 'software framework code dev', 'developer code sharing platform', 'readme documentation file code', 'code on github host', 'source code repo for', 'github search project', 'react repository facebook github', 'vue js source code', 'angular framework repository', 'svelte compiler github', 'next js vercel repository', 'nuxt framework github', 'express js middleware npm', 'fastapi python framework repo', 'django web framework github', 'flask microframework repository', 'spring boot java framework', 'laravel php framework github', 'rails ruby framework repo', 'dotnet core repository microsoft', 'tensorflow machine learning google', 'pytorch deep learning facebook', 'scikit learn python library', 'pandas data analysis python', 'numpy numerical computing python', 'matplotlib plotting library python', 'jupyter notebook project github', 'vscode editor source code', 'atom editor github repository', 'sublime text packages repo', 'vim plugin manager github', 'neovim fork repository', 'emacs packages melpa', 'docker container engine github', 'kubernetes orchestration google', 'terraform infrastructure hashicorp', 'ansible automation redhat', 'jenkins ci cd pipeline', 'gitlab self hosted repository', 'bitbucket atlassian git hosting', 'homebrew package manager mac', 'apt package manager debian', 'yum package manager redhat', 'npm registry packages js', 'pypi python packages repository', 'cargo rust package manager', 'go modules package management', 'maven java build tool', 'gradle build automation tool'] },
    { key: 'wolfram', examples: ['calculate math integral equation', 'derivative math formula result', 'solve algebraic equation math', 'plot mathematical function graph', 'scientific mass of planet physics', 'unit conversion math weight', 'atomic weight chemistry value', 'computational math problem solver', 'scientific constant value physics', 'calculate physics distance math', 'solve for x math', 'mathematical calculation of', 'integral of e^x sin(x)', 'derivative of ln(x^2+1)', 'limit of sin x over x as x approaches 0', 'sum of 1 over n squared from n equals 1 to infinity', 'solve differential equation y double prime plus y equals 0', 'eigenvalues of matrix 1 2 3 4', 'determinant of 3 by 3 matrix', 'factor x to the fourth minus 1', 'expand a plus b to the fifth', 'gcd of 48 and 180', 'lcm of 12 and 18', 'is 97 a prime number', 'prime factorization of 360', 'binomial coefficient 10 choose 3', 'permutations of 5 items', 'combinations of 6 choose 2', 'standard deviation of 1 2 3 4 5', 'mean and median of dataset', 'probability of rolling a 7 with two dice', 'normal distribution with mean 0 sd 1', 'convert 25 celsius to fahrenheit', 'convert 5 feet 11 inches to cm', 'convert 3 gallons to liters', 'speed of light in mph', 'gravitational constant value', 'planck constant in joule seconds', 'avogadro number', 'boltzmann constant', 'fine structure constant', 'mass of electron in kg', 'radius of hydrogen atom', 'boiling point of ethanol', 'melting point of gold', 'density of water at 4 celsius', 'refractive index of glass', 'wavelength of red light', 'frequency of middle c', 'decibel level of jet engine', 'ph of pure water', 'molar mass of glucose c6h12o6', 'bond angle in methane', 'half life of carbon 14'] }

  let extractor = null;
  let routeVectors = [];
  let modelReady = false;

  async function initModel() {
    try {
      extractor = await pipeline('feature-extraction', 'sentence-transformers/all-MiniLM-L6-v2', {
        dtype: 'q8',
      });

      for (const route of routes) {
        const output = await extractor(route.examples, { pooling: 'mean', normalize: true });
        const vectors = output.tolist();
        routeVectors.push({ key: route.key, vectors });
      }
      modelReady = true;
      status.classList.add('ready');
      status.title = "Embedding Model Ready";
      console.log('Search router: Semantic model loaded');
      updateHint();
    } catch (err) {
      console.error('Search router: Failed to load model', err);
      status.title = "Embedding Model Failed";
      status.style.background = "#ff0000";
    }

  function cosineSimilarity(a, b) {
    let dot = 0, na = 0, nb = 0;
    for (let i = 0; i < a.length; i++) {
      dot += a[i] * b[i];
      na += a[i] * a[i];
      nb += b[i] * b[i];
    }
    const similarity = dot / (Math.sqrt(na) * Math.sqrt(nb));
    return isNaN(similarity) ? 0 : similarity;
  }

  const getEngineKey = async (q, abortToken) => {
    const query = q.toLowerCase().trim();
    if (!query) return { key: 'ddg', scores: [] };

    // 1. Absolute Overrides (Bangs)
    if (query.startsWith('!')) {
      const cmd = query.split(' ')[0].slice(1);
      const cmdMap = {
        'yt': 'youtube', 'y': 'youtube',
        'a': 'amazon', 'amz': 'amazon',
        'm': 'maps', 'map': 'maps', 'i': 'bing-images', 'img': 'bing-images',
        'p': 'perplexity', 'px': 'perplexity', 'g': 'grok', 'gr': 'grok',
        'gh': 'github', 'git': 'github',
        'w': 'wolfram', 'wa': 'wolfram',
        'd': 'ddg', 'ddg': 'ddg'
      };
      if (cmdMap[cmd]) return { key: cmdMap[cmd], scores: [] };
    }
    
    // Direct Link detection
    if (/^[a-z0-9]+([\-\.]{1}[a-z0-9]+)*\.[a-z]{2,10}(:[0-9]{1,5})?(\/.*)?$/i.test(query) && !query.includes(' ')) return { key: 'direct', scores: [] };
    if (/^localhost(:[0-9]{1,5})?(\/.*)?$/i.test(query) && !query.includes(' ')) return { key: 'direct', scores: [] };

    // 2. Semantic Routing (if ready)
    if (modelReady) {
      try {
        const output = await extractor([query], { pooling: 'mean', normalize: true });
        if (abortToken && abortToken.aborted) return null;
        const qVector = output.tolist()[0];
        
        let bestKey = 'ddg';
        let maxScore = -1;
        const allScores = [];
        
        for (const rv of routeVectors) {
          let routeMax = -1;
          for (const v of rv.vectors) {
            const score = cosineSimilarity(qVector, v);
            if (score > routeMax) routeMax = score;
          }
          allScores.push({ key: rv.key, score: routeMax });
          if (routeMax > maxScore) {
            maxScore = routeMax;
            bestKey = rv.key;
          }
        }
        
        allScores.sort((a, b) => b.score - a.score);
        
        if (maxScore > 0.30) return { key: bestKey, scores: allScores };
        return { key: 'ddg', scores: allScores };
      } catch (e) {
        console.error('Inference error', e);
      }
    }

    // 3. Fallback to default
    return { key: 'ddg', scores: [] };
  };

  const scoresPanel = document.getElementById('scores');

  const updateHint = async () => {
    const q = search.value.trim();
    if (!q) {
      hint.classList.remove('active');
      document.documentElement.style.setProperty('--engine-color', 'transparent');
      scoresPanel.classList.remove('active');
      scoresPanel.innerHTML = '';
      return;
    }
    const token = { aborted: false };
    inferenceAbort = token;
    const result = await getEngineKey(q, token);
    if (!result || token.aborted) return;
    inferenceAbort = null;
    const engine = engines[result.key];
    hint.textContent = engine.name;
    hint.classList.add('active');
    document.documentElement.style.setProperty('--engine-color', engine.color);
    
    // Render scores
    if (result.scores.length > 0) {
      scoresPanel.innerHTML = result.scores.map(s => {
        const isBest = s.key === result.key;
        const pct = Math.round(s.score * 100);
        return `<div class="score-row"><span class="score-label">${engines[s.key].name}</span><div class="score-bar"><div class="score-fill ${isBest ? 'best' : ''}" style="width:${pct}%"></div></div><span class="score-val">${pct}%</span></div>`;
      }).join('');
      scoresPanel.classList.add('active');
    } else {
      scoresPanel.classList.remove('active');
      scoresPanel.innerHTML = '';
    }
  };

  const performRoute = async (q, immediate = false) => {
    if (!q) return;
    const result = await getEngineKey(q);
    const target = engines[result.key];
    
    let finalQuery = q;
    if (q.trim().startsWith('!')) {
      const parts = q.trim().split(/\s+/);
      if (parts.length > 1) finalQuery = parts.slice(1).join(' ');
    }
    
    const enc = encodeURIComponent(finalQuery.trim());

    if (immediate) {
      window.location.replace(target.url(result.key === 'direct' ? finalQuery.trim() : enc));
      return;
    }

    display.textContent = target.name;
    overlay.style.display = 'flex';
    search.blur();

    setTimeout(() => { progress.style.width = '100%'; }, 50);
    routeTimer = setTimeout(() => {
      window.location.replace(target.url(result.key === 'direct' ? finalQuery.trim() : enc));
    }, 1500);
  };

  const placeholders = [
    'Type to search...',
    '2 + 2 * 42',
    'pizza near me',
    '!yt lofi hip hop',
    'explain quantum gravity',
    'github.com',
    'image of a black hole',
    'latest AI news',
    '!gh gemini-cli',
    'integral of x^2',
    'distance to moon'
  ];
  let pIdx = 0;
  setInterval(() => {
    if (!search.value) {
      pIdx = (pIdx + 1) % placeholders.length;
      search.placeholder = placeholders[pIdx];
    }
  }, 3000);

  let debounceTimer;
  let inferenceAbort = null;
  search.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    if (inferenceAbort) {
      inferenceAbort.aborted = true;
      inferenceAbort = null;
    }
    debounceTimer = setTimeout(updateHint, 150);
  });

  search.addEventListener('keydown', e => {
    if (e.key === 'Enter') performRoute(search.value);
  });

  cancel.addEventListener('click', () => {
    clearTimeout(routeTimer);
    overlay.style.display = 'none';
    progress.style.width = '0%';
    search.focus();
  });
  
  const qParam = new URLSearchParams(window.location.search).get('q');
  if (qParam) performRoute(qParam, true);

  // Initialize model
  initModel();
</script>
</body>
</html>
