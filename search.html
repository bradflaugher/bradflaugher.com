<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Search Router</title>
<link href="/bookmarks-icon-180.png" rel="apple-touch-icon"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<meta content="Search" name="apple-mobile-web-app-title"/>
<meta content="#000000" name="theme-color"/>
<link rel="stylesheet" href="shared.css?v={{SHARED_CSS_HASH}}">
<link rel="stylesheet" href="search.css?v={{SEARCH_CSS_HASH}}">
<style>
  .search-page-container {
    justify-content: center;
    padding-top: 10vh;
  }
  @media (max-width: 600px) {
    .search-page-container {
      padding-top: 5vh;
    }
  }
</style>
</head>
<body>
<div class="container search-page-container">
<header>
<div class="search-area">
<div class="search-filter-unit">
<div class="search-input-wrap">
<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" stroke-linecap="round" stroke-linejoin="round"></path></svg>
<input autocomplete="off" id="search" placeholder="Search the web..." type="text"/>
</div>
</div>

<div class="engine-grid">
<button class="web-btn" data-engine="ddg"><svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>DuckDuckGo</button>
<button class="web-btn" data-engine="ddg-html"><svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" x2="8" y1="13" y2="13"></line><line x1="16" x2="8" y1="17" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>DDG (Lite)</button>
<button class="web-btn" data-engine="google"><svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 12L21 7.5"></path></svg>Google</button>
<button class="web-btn" data-engine="bing-images"><svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><rect height="18" rx="2" width="18" x="3" y="3"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>Images</button>
<button class="web-btn" data-engine="perplexity"><svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>Perplexity</button>
<button class="web-btn" data-engine="grok"><svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>Grok</button>
<button class="web-btn" data-engine="maps"><svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"></path></svg>Maps</button>
</div>

<div class="browser-selector-wrap" id="browser-selector">
<div class="browser-selector-label">Send to Browser</div>
<div class="browser-selector-row">
<label class="browser-option">
<input name="browser" type="radio" value="safari" checked/>
<span>Safari</span>
</label>
<label class="browser-option">
<input name="browser" type="radio" value="orion"/>
<span>Orion</span>
</label>
<label class="browser-option">
<input name="browser" type="radio" value="comet"/>
<span>Comet</span>
</label>
</div>
</div>
</div>
</header>
</div>
<script src="search.js?v={{SEARCH_JS_HASH}}"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('search');
    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get('q');

    if (query) {
      searchInput.value = query;
    }
  });
</script>
</body>
</html>
