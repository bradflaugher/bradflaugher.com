<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Search Router</title>
<link href="/bookmarks-icon-180.png" rel="apple-touch-icon"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<meta content="Search" name="apple-mobile-web-app-title"/>
<meta content="#000000" name="theme-color"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #000000;
    --surface: #1a1a1a;
    --border: #333333;
    --text: #ffffff;
    --text-muted: #888;
    --accent: #ffffff;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --surface: #f2f2f2;
      --border: #cccccc;
      --text: #000000;
      --text-muted: #666;
      --accent: #000000;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: env(safe-area-inset-top) 2rem env(safe-area-inset-bottom) 2rem;
  }
  .container {
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
  }
  
  .search-input-wrap {
    position: relative;
    background: transparent;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }
  #search {
    width: 100%;
    padding: 0.75rem 0;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 1.5rem;
    font-weight: 300;
    outline: none;
    letter-spacing: -0.025em;
  }
  #clear-search {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.5rem;
    cursor: pointer;
    display: none;
    padding: 5px;
  }

  .engine-grid {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }
  .web-btn {
    padding: 0;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 1.5rem;
    font-weight: 300;
    cursor: pointer;
    text-align: left;
    transition: opacity 0.2s;
    letter-spacing: -0.025em;
  }
  .web-btn:hover {
    opacity: 0.7;
  }
  .web-btn:active {
    opacity: 0.5;
  }
</style>
</head>
<body>
<div class="container">
  <div class="search-input-wrap">
    <input autocomplete="off" id="search" placeholder="Search" type="text"/>
    <button id="clear-search" aria-label="Clear">&times;</button>
  </div>
  <div class="engine-grid">
    <button class="web-btn" data-engine="ddg">DuckDuckGo</button>
    <button class="web-btn" data-engine="bing-images">Bing Images</button>
    <button class="web-btn" data-engine="perplexity">Perplexity</button>
    <button class="web-btn" data-engine="grok">Grok</button>
    <button class="web-btn" data-engine="maps">Maps</button>
  </div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const search = document.getElementById('search');
    const clearBtn = document.getElementById('clear-search');
    const isIOS = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    const doSearch = (engine) => {
      const q = search.value.trim();
      if (!q) { search.focus(); return; }
      const enc = encodeURIComponent(q);
      const urls = {
        'ddg': 'https://html.duckduckgo.com/html/?q=' + enc,
        'bing-images': 'https://www.bing.com/images/search?q=' + enc,
        'perplexity': 'https://www.perplexity.ai/search?q=' + enc,
        'grok': 'https://grok.com/?q=' + enc,
        'maps': 'https://maps.google.com/maps?q=' + enc
      };
      let url = urls[engine] || urls['ddg'];
      if (engine === 'maps' && isIOS) {
        const appUrl = /iPhone|iPad|iPod/.test(navigator.userAgent) ? 'comgooglemaps://?q=' + enc : 'geo:0,0?q=' + enc;
        window.location.href = appUrl;
        setTimeout(() => { if (document.visibilityState !== 'hidden') window.open(url, '_blank'); }, 1500);
        return;
      }
      window.open(url, '_blank');
    };

    document.querySelectorAll('.web-btn').forEach(btn => {
      btn.addEventListener('click', () => doSearch(btn.dataset.engine));
    });

    search.addEventListener('input', () => {
      clearBtn.style.display = search.value ? 'block' : 'none';
    });

    clearBtn.addEventListener('click', () => {
      search.value = '';
      search.focus();
      clearBtn.style.display = 'none';
    });

    search.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch('ddg');
    });
    
    const q = new URLSearchParams(window.location.search).get('q');
    if (q) {
      search.value = q;
      clearBtn.style.display = 'block';
    }
    
    if (!('ontouchstart' in window)) search.focus();
  });
</script>
</body>
</html>
