<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Search</title>
<link href="/search.webmanifest" rel="manifest"/>
<link href="/favicon-32x32.png" rel="icon" type="image/png"/>
<link href="/favicon-144x144.png" rel="apple-touch-icon"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<meta content="#000000" name="theme-color" id="theme-color"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #000000;
    --text: #ffffff;
    --text-muted: #666;
    --accent: #ffffff;
    --engine-color: transparent;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --text: #000000;
      --text-muted: #999;
      --accent: #000000;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: env(safe-area-inset-top) 2rem env(safe-area-inset-bottom) 2rem;
    transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--engine-color);
    opacity: 0.05;
    pointer-events: none;
    transition: background 0.8s ease;
  }
  .container {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
  }
  .input-wrap {
    position: relative;
  }
  #search {
    width: 100%;
    padding: 1.5rem 0;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: clamp(1.5rem, 5vw, 3rem);
    font-weight: 200;
    outline: none;
    letter-spacing: -0.05em;
    transition: all 0.3s;
  }
  .engine-hint {
    position: absolute;
    bottom: -1.5rem;
    left: 0;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0;
    transform: translateY(5px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .engine-hint.active {
    opacity: 1;
    transform: translateY(0);
  }
  .routing-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    text-align: center;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .engine-name {
    font-size: 3.5rem;
    font-weight: 100;
    letter-spacing: -0.06em;
    margin-bottom: 2rem;
  }
  .cancel-btn {
    background: transparent;
    border: 1px solid var(--text-muted);
    color: var(--text-muted);
    padding: 0.6rem 2rem;
    border-radius: 30px;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    margin-top: 3rem;
    transition: all 0.2s;
  }
  .cancel-btn:hover {
    color: var(--text);
    border-color: var(--text);
    background: rgba(255,255,255,0.05);
  }
  .progress-bar {
    width: 240px;
    height: 1px;
    background: var(--text-muted);
    position: relative;
    overflow: hidden;
    opacity: 0.2;
  }
  .progress-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 0%;
    background: var(--text);
    transition: width 1.5s linear;
  }
  .status-dot {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    opacity: 0.3;
    transition: all 0.3s;
  }
  .status-dot.ready {
    background: #00ff00;
    opacity: 0.6;
    box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
  }
  .scores-panel {
    position: fixed;
    bottom: 2rem;
    left: 2rem;
    font-size: 0.7rem;
    font-family: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", monospace;
    color: var(--text-muted);
    opacity: 0;
    transform: translateY(5px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 50;
    line-height: 1.6;
    pointer-events: none;
  }
  .scores-panel.active {
    opacity: 1;
    transform: translateY(0);
  }
  .scores-panel .score-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .scores-panel .score-bar {
    width: 60px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }
  .scores-panel .score-fill {
    height: 100%;
    background: var(--text-muted);
    transition: width 0.3s ease;
  }
  .scores-panel .score-fill.best {
    background: var(--text);
  }
  .scores-panel .score-label {
    width: 70px;
    text-align: right;
  }
  .scores-panel .score-val {
    width: 35px;
    text-align: right;
  }
  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    text-align: center;
  }
  .loading-overlay.active {
    display: flex;
  }
  .loading-text {
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }
  .loading-spinner {
    width: 24px;
    height: 24px;
    border: 1px solid var(--text-muted);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="input-wrap">
    <input autocomplete="off" id="search" placeholder="Type to search..." type="text" autofocus/>
    <div class="engine-hint" id="hint">DuckDuckGo</div>
  </div>
</div>

<div class="routing-overlay" id="overlay">
  <div class="engine-name" id="engine-display">DuckDuckGo</div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <button class="cancel-btn" id="cancel">Cancel</button>
</div>

<div class="status-dot" id="status" title="Embedding Model Loading..."></div>

<div class="scores-panel" id="scores"></div>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading model...</div>
</div>

<script type="module">
  import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.2.4';

  // Configuration
  env.allowLocalModels = true;
  env.allowRemoteModels = false;
  env.localModelPath = '/models/';
  env.useBrowserCache = true;

  let routeTimer = null;
  const search = document.getElementById('search');
  const hint = document.getElementById('hint');
  const overlay = document.getElementById('overlay');
  const display = document.getElementById('engine-display');
  const progress = document.getElementById('progress');
  const cancel = document.getElementById('cancel');
  const status = document.getElementById('status');
  const loadingOverlay = document.getElementById('loading');

  const engines = {
    'ddg': { name: 'DuckDuckGo', color: '#DE5833', url: q => `https://html.duckduckgo.com/html/?q=${q}` },
    'bing-images': { name: 'Bing Images', color: '#008373', url: q => `https://www.bing.com/images/search?q=${q}` },
    'perplexity': { name: 'Perplexity', color: '#20B2AA', url: q => `https://www.perplexity.ai/search?q=${q}` },
    'grok': { name: 'Grok', color: '#ffffff', url: q => `https://grok.com/?q=${q}` },
    'maps': { name: 'Google Maps', color: '#4285F4', url: q => `https://maps.google.com/maps?q=${q}` },
    'youtube': { name: 'YouTube', color: '#FF0000', url: q => `https://www.youtube.com/results?search_query=${q}` },
    'amazon': { name: 'Amazon', color: '#FF9900', url: q => `https://www.amazon.com/s?k=${q}` },
    'github': { name: 'GitHub', color: '#333', url: q => `https://github.com/search?q=${q}` },
    'wolfram': { name: 'Wolfram Alpha', color: '#DA0E1A', url: q => `https://www.wolframalpha.com/input/?i=${q}` },
    'direct': { name: 'Direct Link', color: '#00ff00', url: q => q.startsWith('http') ? q : `https://${q}` }
  };

  let extractor = null;
  let routeVectors = [];
  let modelReady = false;
  let isInitializing = false;
  let isRedirecting = !!new URLSearchParams(window.location.search).get('q');

  async function initModel() {
    if (isInitializing) return;
    isInitializing = true;
    
    // Ensure loading overlay is visible
    loadingOverlay.classList.add('active');
    
    try {
      console.log('Search router: Initializing model...');
      
      // Load pre-calculated embeddings and model in parallel
      const [embeddingsResponse, model] = await Promise.all([
        fetch('./search-embeddings.json'),
        pipeline('feature-extraction', 'sentence-transformers/all-MiniLM-L6-v2', {
          dtype: 'fp32',
        })
      ]);

      if (!embeddingsResponse.ok) {
        throw new Error(`Failed to load search-embeddings.json: ${embeddingsResponse.status} ${embeddingsResponse.statusText}`);
      }
      
      routeVectors = await embeddingsResponse.json();
      extractor = model;
      
      modelReady = true;
      status.classList.add('ready');
      status.title = "Embedding Model Ready";
      
      console.log('Search router: Semantic model loaded');
      
      if (!isRedirecting) {
        loadingOverlay.classList.remove('active');
      }
      
      updateHint();
    } catch (err) {
      console.error('Search router: Failed to load model', err);
      status.title = "Embedding Model Failed: " + err.message;
      status.style.background = "#ff0000";
      loadingOverlay.classList.remove('active');
    } finally {
      isInitializing = false;
    }
  }

  function cosineSimilarity(a, b) {
    let dot = 0, na = 0, nb = 0;
    for (let i = 0; i < a.length; i++) {
      dot += a[i] * b[i];
      na += a[i] * a[i];
      nb += b[i] * b[i];
    }
    const similarity = dot / (Math.sqrt(na) * Math.sqrt(nb));
    return isNaN(similarity) ? 0 : similarity;
  }

  const getEngineKey = async (q, abortToken) => {
    const query = q.toLowerCase().trim();
    if (!query) return { key: 'ddg', scores: [] };

    // 1. Absolute Overrides (Bangs)
    if (query.startsWith('!')) {
      const cmd = query.split(' ')[0].slice(1);
      const cmdMap = {
        'yt': 'youtube', 'y': 'youtube',
        'a': 'amazon', 'amz': 'amazon',
        'm': 'maps', 'map': 'maps', 'i': 'bing-images', 'img': 'bing-images',
        'p': 'perplexity', 'px': 'perplexity', 'g': 'grok', 'gr': 'grok',
        'gh': 'github', 'git': 'github',
        'w': 'wolfram', 'wa': 'wolfram',
        'd': 'ddg', 'ddg': 'ddg'
      };
      if (cmdMap[cmd]) return { key: cmdMap[cmd], scores: [] };
    }
    
    // Direct Link detection
    if (/^[a-z0-9]+([\-\.]{1}[a-z0-9]+)*\.[a-z]{2,10}(:[0-9]{1,5})?(\/.*)?$/i.test(query) && !query.includes(' ')) return { key: 'direct', scores: [] };
    if (/^localhost(:[0-9]{1,5})?(\/.*)?$/i.test(query) && !query.includes(' ')) return { key: 'direct', scores: [] };

    // 2. Semantic Routing (if ready)
    if (modelReady) {
      try {
        const output = await extractor([query], { pooling: 'mean', normalize: true });
        if (abortToken && abortToken.aborted) return null;
        const qVector = output.tolist()[0];
        
        let bestKey = 'ddg';
        let maxScore = -1;
        const allScores = [];
        
        for (const rv of routeVectors) {
          let routeMax = -1;
          for (const v of rv.vectors) {
            const score = cosineSimilarity(qVector, v);
            if (score > routeMax) routeMax = score;
          }
          allScores.push({ key: rv.key, score: routeMax });
          if (routeMax > maxScore) {
            maxScore = routeMax;
            bestKey = rv.key;
          }
        }
        
        allScores.sort((a, b) => b.score - a.score);
        
        if (maxScore > 0.30) return { key: bestKey, scores: allScores };
        return { key: 'ddg', scores: allScores };
      } catch (e) {
        console.error('Inference error', e);
      }
    }

    // 3. Fallback to default
    return { key: 'ddg', scores: [] };
  };

  const scoresPanel = document.getElementById('scores');

  const updateHint = async () => {
    const q = search.value.trim();
    if (!q) {
      hint.classList.remove('active');
      document.documentElement.style.setProperty('--engine-color', 'transparent');
      scoresPanel.classList.remove('active');
      scoresPanel.innerHTML = '';
      return;
    }
    const token = { aborted: false };
    inferenceAbort = token;
    const result = await getEngineKey(q, token);
    if (!result || token.aborted) return;
    inferenceAbort = null;
    const engine = engines[result.key];
    hint.textContent = engine.name;
    hint.classList.add('active');
    document.documentElement.style.setProperty('--engine-color', engine.color);
    
    // Render scores
    if (result.scores.length > 0) {
      scoresPanel.innerHTML = result.scores.map(s => {
        const isBest = s.key === result.key;
        const pct = Math.round(s.score * 100);
        return `<div class="score-row"><span class="score-label">${engines[s.key].name}</span><div class="score-bar"><div class="score-fill ${isBest ? 'best' : ''}" style="width:${pct}%"></div></div><span class="score-val">${pct}%</span></div>`;
      }).join('');
      scoresPanel.classList.add('active');
    } else {
      scoresPanel.classList.remove('active');
      scoresPanel.innerHTML = '';
    }
  };

  const performRoute = async (q, immediate = false) => {
    if (!q) return;
    const result = await getEngineKey(q);
    const target = engines[result.key];
    
    let finalQuery = q;
    if (q.trim().startsWith('!')) {
      const parts = q.trim().split(/\s+/);
      if (parts.length > 1) finalQuery = parts.slice(1).join(' ');
    }
    
    const enc = encodeURIComponent(finalQuery.trim());

    if (immediate) {
      window.location.replace(target.url(result.key === 'direct' ? finalQuery.trim() : enc));
      return;
    }

    display.textContent = target.name;
    overlay.style.display = 'flex';
    search.blur();

    setTimeout(() => { progress.style.width = '100%'; }, 50);
    routeTimer = setTimeout(() => {
      window.location.replace(target.url(result.key === 'direct' ? finalQuery.trim() : enc));
    }, 1500);
  };

  const placeholders = [
    'Type to search...',
    '2 + 2 * 42',
    'pizza near me',
    '!yt lofi hip hop',
    'explain quantum gravity',
    'github.com',
    'image of a black hole',
    'latest AI news',
    '!gh gemini-cli',
    'integral of x^2',
    'distance to moon'
  ];
  let pIdx = 0;
  setInterval(() => {
    if (!search.value) {
      pIdx = (pIdx + 1) % placeholders.length;
      search.placeholder = placeholders[pIdx];
    }
  }, 3000);

  let debounceTimer;
  let inferenceAbort = null;
  let isProcessing = false;
  search.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    if (inferenceAbort) {
      inferenceAbort.aborted = true;
      inferenceAbort = null;
    }
    debounceTimer = setTimeout(() => {
      if (!isProcessing) {
        isProcessing = true;
        updateHint().finally(() => { isProcessing = false; });
      }
    }, 150);
  });

  search.addEventListener('keydown', e => {
    if (e.key === 'Enter') performRoute(search.value);
  });

  cancel.addEventListener('click', () => {
    clearTimeout(routeTimer);
    overlay.style.display = 'none';
    progress.style.width = '0%';
    search.focus();
  });
  
  // Handle query params after model loads
  const qParam = new URLSearchParams(window.location.search).get('q');
  if (qParam) {
    isRedirecting = true;
    const routeWhenReady = async () => {
      try {
        if (modelReady) {
          await performRoute(qParam, true);
        } else if (status.title.startsWith('Embedding Model Failed')) {
          loadingOverlay.classList.remove('active');
        } else {
          setTimeout(routeWhenReady, 100);
        }
      } catch (err) {
        console.error('Redirect failed', err);
        loadingOverlay.classList.remove('active');
      }
    };
    routeWhenReady();
  }

  // Initialize model
  initModel();
</script>
</body>
</html>
